<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trays & Bowls, Sherman Art Works</title>
  <meta name="description" content="Handmade decorative glass bowls and trays from Sherman Art Works. Centrepieces, serving pieces and gift-worthy decorative bowls, crafted in Israel and shipped worldwide." />

  <meta property="og:title" content="Trays & Bowls, Sherman Art Works" />
  <meta property="og:description" content="Handmade decorative glass bowls and trays from Sherman Art Works. Centrepieces, serving pieces and gift-worthy decorative bowls, crafted in Israel and shipped worldwide." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://res.cloudinary.com/doesupaf9/image/upload/w_1200,h_630,c_fit,q_auto,f_auto/WhatsApp_Image_2026-05-23_at_14.50.45_2_lutcx6.jpg" />

  <link rel="icon" type="image/jpeg" href="https://res.cloudinary.com/doesupaf9/image/upload/w_32,h_32,c_fit,q_auto/WhatsApp_Image_2026-05-23_at_14.51.54_xv8lbd.jpg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Frank+Ruhl+Libre:wght@500;700&family=Heebo:wght@400;500;700&family=Cormorant+Garamond:ital,wght@1,400&display=swap" rel="stylesheet" />

  <style>
    :root { --bg:#faf7f2; --dark:#202020; --gold:#d4b572; --brown:#6a5530; --border:#ede5d8; --green:#25d366; --ff-body:'Inter',Arial,sans-serif; --ff-disp:'Fraunces','Cinzel',serif; --ff-ital:'Cormorant Garamond',serif; --fs-xs:0.75rem; --fs-sm:0.875rem; --fs-base:1rem; --fs-lg:1.125rem; --fs-xl:1.5rem; --fs-2xl:2.25rem; --fs-3xl:3rem; --ff-body-he:'Heebo','Arial Hebrew',sans-serif; --ff-disp-he:'Frank Ruhl Libre','David',serif; --footer-text:#a89678; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--ff-body); background: var(--bg); color: var(--dark); line-height: 1.6; }
    img  { max-width: 100%; display: block; }
    a    { color: inherit; text-decoration: none; }
    button { cursor: pointer; font-family: inherit; border: none; background: none; }

    .top-bar { background: var(--dark); color: #d4c5aa; font-size: 0.75rem; letter-spacing: 0.04em; padding: 0.45rem 2rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
    .top-bar-group { display: flex; align-items: center; gap: 0.5rem; }
    .top-divider   { color: rgba(212,181,114,0.35); }
    .toggle-btn { background: none; border: 1px solid rgba(212,181,114,0.3); color: #d4c5aa; padding: 0.2rem 0.65rem; border-radius: 2px; font-size: 0.72rem; font-family: var(--ff-body); letter-spacing: 0.04em; transition: all 0.2s; }
    .toggle-btn.active            { background: var(--gold); color: var(--dark); border-color: var(--gold); font-weight: 500; }
    .toggle-btn:hover:not(.active){ border-color: var(--gold); color: var(--gold); }

    .nav-wrap { background: var(--bg); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    nav { max-width: 1200px; margin: 0 auto; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
    .logo { display: flex; align-items: center; gap: 0.75rem; }
    .logo-mark { height: 42px; width: auto; border-radius: 3px; display: block; flex-shrink: 0; object-fit: contain; }
    .logo-text { display: flex; flex-direction: column; line-height: 1.15; }
    .logo-name { font-family: var(--ff-disp); font-size: 0.9rem; font-weight: 600; letter-spacing: 0.08em; color: var(--dark); }
    .logo-sub  { font-family: var(--ff-ital); font-style: italic; font-size: 0.7rem; color: var(--brown); letter-spacing: 0.03em; }
    .nav-links   { display: flex; align-items: center; gap: 2rem; list-style: none; }
    .nav-links a { font-family: var(--ff-disp); font-size: 0.68rem; letter-spacing: 0.13em; text-transform: uppercase; color: var(--dark); transition: color 0.2s; }
    .nav-links a:hover       { color: var(--gold); }
    .nav-links a.nav-active  { color: var(--gold); border-bottom: 1px solid var(--gold); padding-bottom: 2px; }

    .hamburger { display: none; flex-direction: column; gap: 5px; padding: 0.4rem; }
    .hamburger span { display: block; width: 24px; height: 2px; background: var(--dark); border-radius: 2px; transition: all 0.3s; }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    .mobile-nav { display: none; background: var(--bg); border-top: 1px solid var(--border); padding: 1rem 2rem 1.5rem; }
    .mobile-nav.open { display: block; }
    .mobile-nav ul { list-style: none; display: flex; flex-direction: column; gap: 0; }
    .mobile-nav a { font-family: var(--ff-disp); font-size: 0.82rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dark); display: block; padding: 0.85rem 0; border-bottom: 1px solid var(--border); min-height: 44px; display: flex; align-items: center; }
    .mobile-nav a:hover { color: var(--gold); }

    .shipping-banner { background: var(--dark); color: var(--gold); text-align: center; padding: 0.9rem 2rem; font-family: var(--ff-disp); font-size: 0.72rem; letter-spacing: 0.22em; }

    /* HERO */
    .page-hero { background: var(--dark); padding: 4.5rem 2rem 4rem; text-align: center; }
    .page-hero-inner { max-width: 760px; margin: 0 auto; }
    .breadcrumb { font-family: var(--ff-disp); font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--footer-text); margin-bottom: 1rem; }
    .breadcrumb a { color: var(--footer-text); transition: color 0.2s; }
    .breadcrumb a:hover { color: var(--gold); }
    .breadcrumb-sep { color: rgba(212,181,114,0.4); margin: 0 0.5rem; }
    .page-headline { font-family: var(--ff-disp); font-size: clamp(1.55rem, 5.5vw, 3rem); font-weight: 600; line-height: 1.1; color: #faf7f2; margin-bottom: 1.25rem; }
    .page-subtitle { font-family: var(--ff-ital); font-style: italic; font-size: clamp(1rem, 1.8vw, 1.2rem); color: var(--footer-text); margin-bottom: 0.5rem; }
    .page-body { font-size: 0.95rem; line-height: 1.85; color: var(--footer-text); font-weight: 300; max-width: 560px; margin: 0 auto; }

    /* PRODUCTS SECTION */
    .products-section { max-width: 1280px; margin: 0 auto; padding: 4rem 2rem 2rem; }
    .products-section:last-of-type { padding-bottom: 4rem; }
    .section-sub-header { text-align: center; margin-bottom: 2.5rem; }
    .section-sub-tag    { font-family: var(--ff-disp); font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.5rem; }
    .section-sub-title  { font-family: var(--ff-disp); font-size: clamp(1.4rem, 2.4vw, 1.9rem); font-weight: 600; color: var(--dark); margin-bottom: 0.5rem; }
    .section-sub-sub    { font-family: var(--ff-ital); font-style: italic; font-size: 0.98rem; color: var(--brown); max-width: 540px; margin: 0 auto; }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 1.75rem;
    }

    /* PRODUCT CARD */
    .product-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      display: flex; flex-direction: column;
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      cursor: pointer;
    }
    .product-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(32,32,32,0.1);
      border-color: var(--gold);
    }
    .product-card-img-wrap {
      width: 100%; aspect-ratio: 4 / 3;
      background: #f5f0e8;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .product-card-img {
      width: 100%; height: 100%;
      object-fit: contain;
      padding: 0.6rem;
      transition: transform 0.4s;
    }
    .product-card:hover .product-card-img { transform: scale(1.03); }
    .photo-count-badge {
      position: absolute;
      top: 0.75rem; right: 0.75rem;
      background: rgba(32,32,32,0.78); color: var(--gold);
      font-family: var(--ff-disp); font-size: 0.6rem; font-weight: 500;
      letter-spacing: 0.1em;
      padding: 0.35rem 0.65rem; border-radius: 12px;
      backdrop-filter: blur(4px);
    }
    [dir="rtl"] .photo-count-badge { right: auto; left: 0.75rem; }

    .product-card-body {
      padding: 1.25rem 1.35rem 1.4rem;
      display: flex; flex-direction: column; gap: 0.75rem; flex: 1;
    }
    .product-card-name {
      font-family: var(--ff-disp); font-size: 1.05rem;
      letter-spacing: 0.04em; font-weight: 600;
      color: var(--dark);
      line-height: 1.3;
    }
    .product-card-desc {
      font-family: var(--ff-ital); font-style: italic;
      font-size: 0.88rem; color: var(--brown);
      line-height: 1.55;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .product-card-meta {
      display: flex; align-items: baseline; justify-content: space-between;
      gap: 0.75rem; margin-top: auto; padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }
    .product-card-price {
      font-family: var(--ff-disp); font-size: 1.05rem; font-weight: 600;
      color: var(--dark);
    }
    .product-card-price-alt { font-size: 0.74rem; color: var(--brown); font-weight: 400; margin-left: 0.3rem; }
    [dir="rtl"] .product-card-price-alt { margin-left: 0; margin-right: 0.3rem; }
    .product-card-measurements { font-size: 0.78rem; color: var(--brown); white-space: nowrap; }

    .product-card-actions { display: flex; gap: 0.4rem; }
    .product-card-actions > * {
      flex: 1; padding: 0.6rem 0.5rem; min-height: 40px;
      font-family: var(--ff-disp); font-size: 0.6rem;
      letter-spacing: 0.12em; text-transform: uppercase;
      border-radius: 2px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 0.3rem;
      transition: all 0.2s;
    }
    .btn-details { background: transparent; color: var(--dark); border: 1px solid var(--dark); }
    .btn-details:hover { background: var(--dark); color: var(--bg); }
    .btn-order { background: var(--green); color: #fff; border: 1px solid var(--green); text-decoration: none; }
    .btn-order:hover { background: #1da851; border-color: #1da851; }

    /* MODAL */
    .product-modal {
      position: fixed; inset: 0;
      background: rgba(20,14,5,0.92);
      display: none; align-items: center; justify-content: center;
      z-index: 1000;
      padding: 1.5rem;
    }
    .product-modal.open { display: flex; }
    .modal-inner {
      background: #fff; border-radius: 6px;
      max-width: 1100px; width: 100%; max-height: 92vh;
      display: grid; grid-template-columns: 1.15fr 1fr;
      overflow: hidden;
      position: relative;
      animation: modalIn 0.25s ease-out;
    }
    @keyframes modalIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }

    .modal-gallery {
      background: #f5f0e8;
      padding: 1.5rem 1.5rem 1.25rem;
      display: flex; flex-direction: column; gap: 1rem;
      overflow: hidden;
    }
    .modal-main-wrap {
      flex: 1; position: relative;
      display: flex; align-items: center; justify-content: center;
      min-height: 300px;
    }
    .modal-main-img {
      max-width: 100%; max-height: 60vh;
      object-fit: contain;
      transition: opacity 0.2s;
    }
    .modal-nav {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      width: 38px; height: 38px;
      background: rgba(32,32,32,0.75); color: var(--gold);
      border-radius: 50%;
      font-size: 1rem; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .modal-nav:hover { background: rgba(32,32,32,0.95); }
    .modal-nav.prev { left: 0.5rem; }
    .modal-nav.next { right: 0.5rem; }
    .modal-thumbs {
      display: flex; gap: 0.4rem;
      overflow-x: auto; padding-bottom: 0.25rem;
      justify-content: center;
    }
    .modal-thumb {
      width: 56px; height: 56px; flex-shrink: 0;
      object-fit: cover; border-radius: 3px;
      cursor: pointer;
      border: 2px solid transparent;
      opacity: 0.55;
      transition: opacity 0.2s, border-color 0.2s;
    }
    .modal-thumb:hover { opacity: 0.85; }
    .modal-thumb.active { opacity: 1; border-color: var(--gold); }

    .modal-info {
      padding: 2rem 1.75rem;
      overflow-y: auto;
      display: flex; flex-direction: column;
    }
    .modal-name {
      font-family: var(--ff-disp);
      font-size: clamp(1.3rem, 2.4vw, 1.7rem);
      font-weight: 600; color: var(--dark);
      line-height: 1.25;
      margin-bottom: 0.3rem;
    }
    .modal-name-alt {
      font-family: var(--ff-ital); font-style: italic;
      font-size: 0.95rem; color: var(--brown);
      margin-bottom: 1.25rem;
    }
    .modal-desc {
      font-size: 0.93rem; color: var(--brown);
      line-height: 1.75;
      margin-bottom: 1.5rem;
      white-space: pre-wrap;
    }
    .modal-specs {
      display: flex; flex-direction: column; gap: 0.6rem;
      padding: 1rem 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }
    .modal-spec-row {
      display: flex; justify-content: space-between; gap: 1rem;
      font-size: 0.88rem;
    }
    .modal-spec-label { color: var(--brown); }
    .modal-spec-value { color: var(--dark); font-weight: 600; text-align: right; }
    [dir="rtl"] .modal-spec-value { text-align: left; }
    .modal-spec-price {
      font-family: var(--ff-disp);
      font-size: 1.15rem;
    }
    .modal-cta-stack { display: flex; flex-direction: column; gap: 0.55rem; margin-top: auto; }
    .modal-cta {
      font-family: var(--ff-disp); font-size: 0.7rem;
      letter-spacing: 0.15em; text-transform: uppercase;
      padding: 0.85rem 1.5rem; border-radius: 2px;
      min-height: 44px;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      transition: all 0.2s; text-decoration: none;
    }
    .modal-cta.primary { background: var(--green); color: #fff; border: 2px solid var(--green); }
    .modal-cta.primary:hover { background: #1da851; border-color: #1da851; }
    .modal-cta.secondary { background: transparent; color: var(--dark); border: 2px solid var(--border); }
    .modal-cta.secondary:hover { border-color: var(--dark); }

    .modal-close {
      position: absolute; top: 0.75rem; right: 0.75rem;
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.95); color: var(--dark);
      border-radius: 50%;
      font-size: 1.3rem; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .modal-close:hover { background: #fff; }
    [dir="rtl"] .modal-close { right: auto; left: 0.75rem; }

    /* BOTTOM CUSTOM BAND */
    .custom-band { background: var(--dark); padding: 4rem 2rem; text-align: center; color: #d4c5aa; }
    .custom-band-inner { max-width: 720px; margin: 0 auto; }
    .custom-band-eyebrow { font-family: var(--ff-disp); font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; }
    .custom-band-title { font-family: var(--ff-disp); font-size: clamp(1.4rem, 2.6vw, 2rem); font-weight: 600; color: var(--bg); margin-bottom: 1rem; }
    .custom-band-body { font-size: 0.95rem; color: var(--footer-text); font-weight: 300; line-height: 1.85; margin-bottom: 2rem; }
    .btn-gold { font-family: var(--ff-disp); font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; background: var(--gold); color: var(--dark); padding: 0.85rem 2rem; border: 2px solid var(--gold); border-radius: 2px; transition: all 0.25s; min-height: 44px; display: inline-flex; align-items: center; gap: 0.6rem; }
    .btn-gold:hover { background: transparent; color: var(--gold); }

    /* FOOTER */
    footer { background: var(--dark); color: #d4c5aa; padding: 3.5rem 2rem 2rem; }
    .footer-inner { max-width: 1200px; margin: 0 auto; }
    .footer-top { display: grid; grid-template-columns: 1.6fr 1fr 1fr; gap: 3rem; padding-bottom: 2rem; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 1.5rem; }
    footer .logo-name { color: var(--gold); }
    footer .logo-sub  { color: var(--footer-text); }
    .footer-tagline   { font-size: 0.85rem; color: var(--footer-text); font-weight: 300; line-height: 1.65; margin-top: 0.75rem; }
    .footer-email     { font-size: 0.8rem; color: var(--gold); margin-top: 0.5rem; }
    .footer-email a:hover { text-decoration: underline; }
    .footer-col-title { font-family: var(--ff-disp); font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; }
    .footer-links     { list-style: none; display: flex; flex-direction: column; gap: 0.65rem; }
    .footer-links a   { font-size: 0.84rem; color: var(--footer-text); transition: color 0.2s; }
    .footer-links a:hover { color: var(--gold); }
    .footer-bottom    { display: flex; align-items: center; justify-content: space-between; font-size: 0.74rem; color: var(--footer-text); }
    .footer-badge     { display: flex; align-items: center; gap: 0.4rem; }
    .social-links     { display: flex; gap: 0.6rem; margin-top: 0.85rem; }
    .social-link      { display: inline-flex; align-items: center; justify-content: center; width: 34px; height: 34px; border: 1px solid rgba(212,181,114,0.25); border-radius: 3px; color: var(--footer-text); transition: all 0.2s; }
    .social-link:hover { border-color: var(--gold); color: var(--gold); }

    /* FLOATING WHATSAPP */
    .floating-wa { position: fixed; bottom: 1.5rem; right: 1.5rem; width: 56px; height: 56px; background: var(--green); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(0,0,0,0.25); z-index: 998; transition: transform 0.2s, background 0.2s, box-shadow 0.2s; }
    .floating-wa:hover { background: #1da851; transform: scale(1.08); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
    [dir="rtl"] .floating-wa { right: auto; left: 1.5rem; }
    @media (max-width: 600px) {
      .floating-wa { bottom: 1rem; right: 1rem; width: 52px; height: 52px; }
      [dir="rtl"] .floating-wa { right: auto; left: 1rem; }
    }

    /* RTL */
    [dir="rtl"] .top-bar          { flex-direction: row-reverse; }
    [dir="rtl"] .top-bar-group    { flex-direction: row-reverse; }
    [dir="rtl"] nav               { flex-direction: row-reverse; }
    [dir="rtl"] .nav-links        { flex-direction: row-reverse; }
    [dir="rtl"] .page-hero        { direction: rtl; }
    [dir="rtl"] .products-section { direction: rtl; }
    [dir="rtl"] .modal-info       { direction: rtl; }
    [dir="rtl"] .custom-band      { direction: rtl; }
    [dir="rtl"] .footer-top       { direction: rtl; }
    [dir="rtl"] .footer-bottom    { flex-direction: row-reverse; }
    [dir="rtl"] .mobile-nav ul    { direction: rtl; }

    /* RESPONSIVE */
    @media (max-width: 800px) {
      .modal-inner { grid-template-columns: 1fr; max-height: 96vh; }
      .modal-gallery { padding: 1.25rem 1.25rem 0.75rem; }
      .modal-main-wrap { min-height: 220px; }
      .modal-main-img { max-height: 40vh; }
      .modal-info { padding: 1.5rem 1.25rem; }
    }
    @media (max-width: 768px) {
      .top-bar { padding: 0.4rem 1rem; }
      .hamburger { display: flex; }
      .nav-links { display: none; }
      nav { padding: 0.75rem 1rem; }
      .products-section { padding: 2.5rem 1rem 1rem; }
      .custom-band { padding: 3rem 1rem; }
      .footer-top { grid-template-columns: 1fr 1fr; }
      .footer-bottom { flex-direction: column; gap: 0.5rem; text-align: center; }
    }
    @media (max-width: 480px) {
      .footer-top { grid-template-columns: 1fr; gap: 2rem; }
      .page-hero { padding: 3rem 1rem 2.5rem; }
    }
  
    /* Hebrew typography */
    [lang="he"] body { font-family: var(--ff-body-he); }
    [lang="he"] .hero-headline,
    [lang="he"] .section-title,
    [lang="he"] .story-title,
    [lang="he"] .contact-title,
    [lang="he"] .corporate-title,
    [lang="he"] .cat-card-title,
    [lang="he"] .product-name,
    [lang="he"] .logo-name,
    [lang="he"] .nav-links a,
    [lang="he"] .mobile-nav a,
    [lang="he"] .btn-primary,
    [lang="he"] .btn-outline,
    [lang="he"] .btn-gold,
    [lang="he"] .btn-wa,
    [lang="he"] .btn-cart,
    [lang="he"] .form-submit,
    [lang="he"] .cta-link,
    [lang="he"] .section-tag,
    [lang="he"] .story-tag,
    [lang="he"] .contact-tag,
    [lang="he"] .corporate-tag,
    [lang="he"] .footer-col-title,
    [lang="he"] .page-headline,
    [lang="he"] .page-eyebrow,
    [lang="he"] .about-tag,
    [lang="he"] .about-title,
    [lang="he"] h1, [lang="he"] h2, [lang="he"] h3, [lang="he"] h4 { font-family: var(--ff-disp-he); letter-spacing: 0.02em; }

  
    /* ── SHOP DROPDOWN ────────────────────────── */
    .nav-dropdown { position: relative; }
    .nav-dropdown-toggle {

      modal_email:    'או שלחו מייל',

      custom_eyebrow: 'מחפשים משהו אחר?',
      custom_title:   'אנחנו מייצרים קערות ומגשים בהזמנה',
      custom_body:    'קערה בפלטת הצבעים שלכם, מגש הגשה עם כיתוב, מרכז שולחן לאירוע, ספרו לנו מה יש לכם בראש ונעצב את זה יחד.',
      custom_cta:     'התחילו הזמנה מיוחדת',

      footer_tagline:        'אמנות זכוכית ויודאיקה עשויות ביד מישראל',
      footer_col_shop:       'חנות',
      footer_col_studio:     'הסטודיו',
      footer_link_candles:   'פמוטים',
      footer_link_shofars:   'שופרות וגביעים',
      footer_link_bowls:     'מגשים וקערות',
      footer_all_collections:'כל הקולקציות',
      footer_copy:           '© 2026 שרמן ארט וורקס. כל הזכויות שמורות.',
      footer_badge:          'עשוי ביד בישראל',
    }
  };

  let currentLang = 'en';
  let usdRate = null;

  // ── CURRENCY (live ILS->USD) ──
  async function loadUsdRate() {
    try {
      const res = await fetch('https://open.er-api.com/v6/latest/ILS');
      const data = await res.json();
      if (data && data.rates && typeof data.rates.USD === 'number') {
        usdRate = data.rates.USD;
        renderProducts();
      }
    } catch (e) {
      // Silent fallback: USD price simply won't show
    }
  }

  function formatPrice(ils) {
    const main = '₪' + ils.toLocaleString('en-IL');
    if (!usdRate) return main;
    const usd = ils * usdRate;
    const usdStr = '$' + usd.toFixed(usd < 100 ? 0 : 0);
    return `${main} <span class="product-card-price-alt">≈ ${usdStr}</span>`;
  }

  function formatPriceModal(ils) {
    const main = '₪' + ils.toLocaleString('en-IL');
    if (!usdRate) return main;
    const usd = ils * usdRate;
    return `${main} <span style="font-size:0.78rem;color:var(--brown);font-weight:400;">≈ $${usd.toFixed(0)}</span>`;
  }

  // ── PRODUCT WHATSAPP MESSAGE ──
  function waLinkForProduct(p) {
    const l = currentLang;
    const name = l === 'he' && p.name_he ? p.name_he : p.name_en;
    const msg = l === 'he'
      ? `שלום, אני מתעניין/ת ב"${name}". אשמח לפרטים נוספים.`
      : `Hi, I'd like to know more about "${name}".`;
    return `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`;
  }

  function emailLinkForProduct(p) {
    const name = p.name_en;
    const subject = encodeURIComponent(`Enquiry: ${name}`);
    const body = encodeURIComponent(`Hi,\n\nI'd like to know more about "${name}".\n\nPlease send me any further info you have.\n\nThanks.`);
    return `mailto:shermanartwork@gmail.com?subject=${subject}&body=${body}`;
  }

  // ── PRODUCT CARD RENDER ──
  function buildCard(product, idx) {
    const l = currentLang;
    const name = l === 'he' && product.name_he ? product.name_he : product.name_en;
    const desc = l === 'he' && product.description_he ? product.description_he : product.description_en;
    const firstPhoto = product.photos[0];
    const extra = product.photos.length - 1;
    const measurementsHtml = product.measurements
      ? `<span class="product-card-measurements">${product.measurements}</span>`
      : '';
    return `
      <article class="product-card" onclick="openModal(${idx})">
        <div class="product-card-img-wrap">
          <img class="product-card-img" loading="lazy"
               src="${CDN}/w_600,c_fit,q_auto,f_auto/${firstPhoto}.jpg"
               alt="${escapeAttr(name)}" />
          ${extra > 0 ? `<span class="photo-count-badge">+${extra}</span>` : ''}
        </div>
        <div class="product-card-body">
          <h3 class="product-card-name">${escapeHtml(name)}</h3>
          ${desc ? `<p class="product-card-desc">${escapeHtml(desc)}</p>` : ''}
          <div class="product-card-meta">
            <span class="product-card-price">${formatPrice(product.price_ils)}</span>
            ${measurementsHtml}
          </div>
          <div class="product-card-actions">
            <button class="btn-details" onclick="event.stopPropagation();openModal(${idx})" data-t="view_details">${T[l].view_details}</button>
            <a class="btn-order" target="_blank" rel="noopener noreferrer"
               href="${waLinkForProduct(product)}" onclick="event.stopPropagation()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg><span data-t="order_btn">${T[l].order_btn}</span>
            </a>
          </div>
        </div>
      </article>
    `;
  }

  function renderProducts() {
    for (const sectionKey of SECTION_KEYS) {
      const grid = document.getElementById(`grid-${sectionKey}`);
      if (!grid) continue;
      const ids = SECTION_PRODUCT_IDS[sectionKey] || [];
      const items = PRODUCTS.map((p, idx) => ({ p, idx })).filter(({ p }) => ids.includes(p.id));
      grid.innerHTML = items.map(({ p, idx }) => buildCard(p, idx)).join('');
    }
  }

  function escapeHtml(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
  function escapeAttr(s) { return (s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;'); }

  // ── MODAL ──
  let currentModalIdx = null;
  let currentPhotoIdx = 0;

  function openModal(idx) {
    currentModalIdx = idx;
    currentPhotoIdx = 0;
    renderModal();
    document.getElementById('productModal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeModal() {
    document.getElementById('productModal').classList.remove('open');
    document.body.style.overflow = '';
    currentModalIdx = null;
  }

  function renderModal() {
    if (currentModalIdx == null) return;
    const p = PRODUCTS[currentModalIdx];
    const l = currentLang;
    const name = l === 'he' && p.name_he ? p.name_he : p.name_en;
    const altName = l === 'he' ? (p.name_en || '') : (p.name_he || '');
    const desc = l === 'he' && p.description_he ? p.description_he : p.description_en;

    document.getElementById('modalName').textContent = name;
    document.getElementById('modalNameAlt').textContent = altName;
    document.getElementById('modalNameAlt').style.display = altName ? '' : 'none';
    document.getElementById('modalDesc').textContent = desc || '';
    document.getElementById('modalDesc').style.display = desc ? '' : 'none';

    const measurementsEl = document.getElementById('modalMeasurements');
    const measurementsRow = document.getElementById('modalMeasurementsRow');
    if (p.measurements) {
      measurementsEl.textContent = p.measurements;
      measurementsRow.style.display = '';
    } else {
      measurementsRow.style.display = 'none';
    }
    document.getElementById('modalPrice').innerHTML = formatPriceModal(p.price_ils);

    // Photo
    const photo = p.photos[currentPhotoIdx];
    document.getElementById('modalMainImg').src = `${CDN}/q_auto,f_auto/${photo}.jpg`;
    document.getElementById('modalMainImg').alt = `${name} — photo ${currentPhotoIdx + 1} of ${p.photos.length}`;

    // Thumbs
    document.getElementById('modalThumbs').innerHTML = p.photos.map((id, i) => `
      <img class="modal-thumb ${i === currentPhotoIdx ? 'active' : ''}"
           src="${CDN}/w_120,h_120,c_fill,g_auto,q_auto,f_auto/${id}.jpg"
           onclick="setModalPhoto(${i})" alt="" />
    `).join('');

    const showNav = p.photos.length > 1;
    document.getElementById('modalPrev').style.display = showNav ? '' : 'none';
    document.getElementById('modalNext').style.display = showNav ? '' : 'none';
    document.getElementById('modalThumbs').style.display = showNav ? '' : 'none';

    document.getElementById('modalOrderCta').href = waLinkForProduct(p);
    document.getElementById('modalEmailCta').href = emailLinkForProduct(p);
  }

  function setModalPhoto(i) { currentPhotoIdx = i; renderModal(); }
  function nextModalPhoto() {
    const p = PRODUCTS[currentModalIdx];
    if (!p) return;
    currentPhotoIdx = (currentPhotoIdx + 1) % p.photos.length;
    renderModal();
  }
  function prevModalPhoto() {
    const p = PRODUCTS[currentModalIdx];
    if (!p) return;
    currentPhotoIdx = (currentPhotoIdx - 1 + p.photos.length) % p.photos.length;
    renderModal();
  }

  // ── LANGUAGE ──
  function setLang(l) {
    currentLang = l;
    const dict = T[l];
    const html = document.documentElement;
    document.querySelectorAll('[data-t]').forEach(el => {
      const val = dict[el.dataset.t];
      if (val !== undefined) el.textContent = val;
    });
    html.lang = l;
    html.dir  = l === 'he' ? 'rtl' : 'ltr';
    document.getElementById('btnEN').classList.toggle('active', l === 'en');
    document.getElementById('btnHE').classList.toggle('active', l === 'he');
    renderProducts();
    if (currentModalIdx != null) renderModal();
  }

  // ── NAV / KEYBOARD ──
  function toggleNav() {
    const burger = document.getElementById('hamburger');
    const nav    = document.getElementById('mobileNav');
    const open   = burger.classList.toggle('open');
    nav.classList.toggle('open', open);
    burger.setAttribute('aria-expanded', open);
    nav.setAttribute('aria-hidden', !open);
  }
  function closeMobileNav() {
    const burger = document.getElementById('hamburger');
    const nav    = document.getElementById('mobileNav');
    burger.classList.remove('open');
    nav.classList.remove('open');
    burger.setAttribute('aria-expanded', 'false');
    nav.setAttribute('aria-hidden', 'true');
  }
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
    if (currentModalIdx != null) {
      if (e.key === 'ArrowLeft')  prevModalPhoto();
      if (e.key === 'ArrowRight') nextModalPhoto();
    }
  });

  document.addEventListener('DOMContentLoaded', () => {
    setLang('en');
    loadUsdRate();
  });
</script>


<script>
  // Shop dropdown handlers (self-contained, no DOMContentLoaded dependency)
  function toggleShopDropdown(e) {
    if (e) e.stopPropagation();
    const t = document.querySelector('.nav-dropdown-toggle');
    const m = document.querySelector('.nav-dropdown-menu');
    if (!t || !m) return;
    const open = t.getAttribute('aria-expanded') === 'true';
    t.setAttribute('aria-expanded', String(!open));
    m.classList.toggle('open', !open);
  }
  function toggleMobileShop(e) {
    if (e) e.stopPropagation();
    const t = document.querySelector('.mobile-shop-toggle');
    const m = document.querySelector('.mobile-shop-menu');
    if (!t || !m) return;
    const open = t.getAttribute('aria-expanded') === 'true';
    t.setAttribute('aria-expanded', String(!open));
    m.classList.toggle('open', !open);
  }
  document.addEventListener('click', (e) => {
    if (e.target.closest('.nav-dropdown')) return;
    const t = document.querySelector('.nav-dropdown-toggle');
    const m = document.querySelector('.nav-dropdown-menu');
    if (t && m) { t.setAttribute('aria-expanded','false'); m.classList.remove('open'); }
  });
  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Escape') return;
    document.querySelectorAll('.nav-dropdown-toggle, .mobile-shop-toggle').forEach(t => {
      t.setAttribute('aria-expanded', 'false');
      const sib = t.nextElementSibling;
      if (sib) sib.classList.remove('open');
    });
  });
</script>
