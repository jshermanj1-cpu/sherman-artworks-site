<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About — Sherman Art Works</title>
  <meta name="description" content="Three generations of the Sherman family, handcrafting glass art in Israel. A passion for glass that began with a grandfather's love of the medium, carried forward through generations." />

  <!-- Open Graph -->
  <meta property="og:title" content="About — Sherman Art Works" />
  <meta property="og:description" content="Three generations of the Sherman family, creating handmade glass art and Judaica in Israel. A craft built on passion, passed down through generations." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://res.cloudinary.com/doesupaf9/image/upload/w_1200,h_630,c_fit,q_auto,f_auto/WhatsApp_Image_2026-05-23_at_14.50.45_2_lutcx6.jpg" />

  <!-- Favicon -->
  <link rel="icon" type="image/jpeg" href="https://res.cloudinary.com/doesupaf9/image/upload/w_32,h_32,c_fit,q_auto/WhatsApp_Image_2026-05-23_at_14.51.54_xv8lbd.jpg" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,600;1,400&family=Heebo:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* ── TOKENS ──────────────────────────────── */
    :root {
      --bg:      #faf7f2;
      --dark:    #2a1f0e;
      --gold:    #c9a85c;
      --brown:   #8a6f40;
      --border:  #ede5d8;
      --ff-body: 'Heebo', sans-serif;
      --ff-disp: 'Cinzel', serif;
      --ff-ital: 'Cormorant Garamond', serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--ff-body); background: var(--bg); color: var(--dark); line-height: 1.6; }
    img  { max-width: 100%; display: block; }
    a    { color: inherit; text-decoration: none; }
    button { cursor: pointer; font-family: inherit; border: none; background: none; }

    /* ── TOP BAR ─────────────────────────────── */
    .top-bar {
      background: var(--dark); color: #d4c5aa;
      font-size: 0.75rem; letter-spacing: 0.04em;
      padding: 0.45rem 2rem;
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
    }
    .top-bar-group { display: flex; align-items: center; gap: 0.5rem; }
    .top-divider   { color: rgba(201,168,92,0.35); }
    .toggle-btn {
      background: none; border: 1px solid rgba(201,168,92,0.3);
      color: #d4c5aa; padding: 0.2rem 0.65rem; border-radius: 2px;
      font-size: 0.72rem; font-family: var(--ff-body); letter-spacing: 0.04em; transition: all 0.2s;
    }
    .toggle-btn.active             { background: var(--gold); color: var(--dark); border-color: var(--gold); font-weight: 500; }
    .toggle-btn:hover:not(.active) { border-color: var(--gold); color: var(--gold); }

    /* ── NAV ─────────────────────────────────── */
    .nav-wrap {
      background: var(--bg); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    nav {
      max-width: 1200px; margin: 0 auto;
      padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: 0.75rem; }
    .logo-mark { height: 42px; width: auto; border-radius: 3px; display: block; flex-shrink: 0; object-fit: contain; }
    .logo-text { display: flex; flex-direction: column; line-height: 1.15; }
    .logo-name { font-family: var(--ff-disp); font-size: 0.9rem; font-weight: 600; letter-spacing: 0.08em; color: var(--dark); }
    .logo-sub  { font-family: var(--ff-ital); font-style: italic; font-size: 0.7rem; color: var(--brown); letter-spacing: 0.03em; }
    .nav-links   { display: flex; align-items: center; gap: 2rem; list-style: none; }
    .nav-links a { font-family: var(--ff-disp); font-size: 0.68rem; letter-spacing: 0.13em; text-transform: uppercase; color: var(--dark); transition: color 0.2s; }
    .nav-links a:hover      { color: var(--gold); }
    .nav-links a.nav-active { color: var(--gold); border-bottom: 1px solid var(--gold); padding-bottom: 2px; }
    .hamburger { display: none; flex-direction: column; gap: 5px; padding: 0.4rem; }
    .hamburger span { display: block; width: 24px; height: 2px; background: var(--dark); border-radius: 2px; transition: all 0.3s; }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    .mobile-nav { display: none; background: var(--bg); border-top: 1px solid var(--border); padding: 1rem 2rem 1.5rem; }
    .mobile-nav.open { display: block; }
    .mobile-nav ul { list-style: none; display: flex; flex-direction: column; }
    .mobile-nav a {
      font-family: var(--ff-disp); font-size: 0.82rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--dark); padding: 0.85rem 0; border-bottom: 1px solid var(--border);
      min-height: 44px; display: flex; align-items: center;
    }
    .mobile-nav a:hover { color: var(--gold); }

    /* ── SHIPPING BANNER ─────────────────────── */
    .shipping-banner {
      background: var(--dark); color: var(--gold); text-align: center;
      padding: 0.9rem 2rem; font-family: var(--ff-disp); font-size: 0.72rem; letter-spacing: 0.22em;
    }

    /* ── PAGE HERO ───────────────────────────── */
    .page-hero { background: var(--dark); padding: 6rem 2rem 5rem; text-align: center; }
    .page-hero-inner { max-width: 720px; margin: 0 auto; }
    .page-eyebrow {
      font-family: var(--ff-disp); font-size: 0.65rem; letter-spacing: 0.28em;
      text-transform: uppercase; color: var(--gold); margin-bottom: 1.25rem;
    }
    .page-headline {
      font-family: var(--ff-disp);
      font-size: clamp(2rem, 4vw, 3.4rem);
      font-weight: 600; line-height: 1.1; color: #faf7f2; margin-bottom: 1.25rem;
    }
    .page-subtitle {
      font-family: var(--ff-ital); font-style: italic;
      font-size: clamp(1rem, 1.8vw, 1.3rem);
      color: #9a8870; margin-bottom: 0;
    }

    /* ── SECTION COMMONS ─────────────────────── */
    .section { max-width: 1200px; margin: 0 auto; padding: 5.5rem 2rem; }
    .section-divider { border-top: 1px solid var(--border); }
    .ornament { text-align: center; color: var(--gold); letter-spacing: 0.5rem; margin-bottom: 1rem; opacity: 0.55; font-size: 0.8rem; }
    .section-tag   { font-family: var(--ff-disp); font-size: 0.62rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.75rem; }
    .section-title { font-family: var(--ff-disp); font-size: clamp(1.6rem, 2.8vw, 2.4rem); font-weight: 600; color: var(--dark); margin-bottom: 0.75rem; }
    .section-sub   { font-family: var(--ff-ital); font-style: italic; font-size: 1.05rem; color: var(--brown); }

    /* ── ORIGIN STORY ────────────────────────── */
    .story-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 5rem; align-items: center;
    }
    .story-images { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .story-img-main { grid-column: 1 / -1; border-radius: 4px; overflow: hidden; }
    .story-img-main img { width: 100%; height: auto; }
    .story-img-sm   { border-radius: 4px; overflow: hidden; }
    .story-img-sm img { width: 100%; height: auto; }

    .story-tag   { font-family: var(--ff-disp); font-size: 0.62rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; }
    .story-title { font-family: var(--ff-disp); font-size: clamp(1.5rem, 2.4vw, 2.2rem); font-weight: 600; color: var(--dark); margin-bottom: 1.5rem; line-height: 1.2; }
    .story-body  { font-size: 0.95rem; line-height: 1.95; color: var(--brown); font-weight: 300; }
    .story-body p + p { margin-top: 1.25rem; }
    .story-sig   { margin-top: 2rem; font-family: var(--ff-ital); font-style: italic; font-size: 1.15rem; color: var(--gold); }

    /* ── GENERATIONS BAND ────────────────────── */
    .gen-band { background: var(--dark); padding: 5rem 2rem; }
    .gen-inner { max-width: 1200px; margin: 0 auto; }
    .gen-header { text-align: center; margin-bottom: 3.5rem; }
    .gen-tag   { font-family: var(--ff-disp); font-size: 0.62rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.75rem; }
    .gen-title { font-family: var(--ff-disp); font-size: clamp(1.5rem, 2.4vw, 2rem); font-weight: 600; color: #faf7f2; }

    .gen-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
    .gen-card {
      border: 1px solid rgba(201,168,92,0.2);
      border-radius: 4px; padding: 2.25rem 1.75rem;
      text-align: center; position: relative;
    }
    .gen-num {
      font-family: var(--ff-disp); font-size: 3rem; font-weight: 600;
      color: var(--gold); opacity: 0.2; line-height: 1; margin-bottom: 1rem;
    }
    .gen-label {
      font-family: var(--ff-disp); font-size: 0.7rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--gold); margin-bottom: 0.85rem;
    }
    .gen-name  {
      font-family: var(--ff-ital); font-style: italic;
      font-size: 1.2rem; color: #faf7f2; margin-bottom: 0.85rem;
    }
    .gen-body  { font-size: 0.84rem; color: #7a6a50; font-weight: 300; line-height: 1.75; }

    /* ── CRAFT SECTION ───────────────────────── */
    .craft-grid {
      display: grid; grid-template-columns: 1.1fr 1fr;
      gap: 5rem; align-items: center;
    }
    .craft-text .section-tag   { display: block; margin-bottom: 0.75rem; }
    .craft-text .section-title { display: block; margin-bottom: 1.5rem; }
    .craft-body { font-size: 0.95rem; line-height: 1.95; color: var(--brown); font-weight: 300; }
    .craft-body p + p { margin-top: 1.25rem; }

    .craft-values { margin-top: 2.5rem; display: flex; flex-direction: column; gap: 1rem; }
    .craft-value {
      display: flex; align-items: flex-start; gap: 1rem;
      padding: 1.1rem 1.25rem;
      border: 1px solid var(--border); border-radius: 4px;
      background: #fff;
    }
    .craft-value-icon { font-size: 1.25rem; flex-shrink: 0; margin-top: 0.1rem; }
    .craft-value-text {}
    .craft-value-title { font-family: var(--ff-disp); font-size: 0.78rem; letter-spacing: 0.06em; color: var(--dark); margin-bottom: 0.3rem; }
    .craft-value-body  { font-size: 0.82rem; color: var(--brown); font-weight: 300; line-height: 1.65; }

    .craft-images { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .craft-img-main { grid-column: 1 / -1; border-radius: 4px; overflow: hidden; }
    .craft-img-main img { width: 100%; height: auto; }
    .craft-img-sm   { border-radius: 4px; overflow: hidden; }
    .craft-img-sm img { width: 100%; height: auto; }

    /* ── CTA BAND ────────────────────────────── */
    .cta-band { background: #f5f0e8; padding: 5rem 2rem; text-align: center; border-top: 1px solid var(--border); }
    .cta-inner { max-width: 640px; margin: 0 auto; }
    .cta-tag   { font-family: var(--ff-disp); font-size: 0.62rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; }
    .cta-title { font-family: var(--ff-disp); font-size: clamp(1.4rem, 2.4vw, 2rem); font-weight: 600; color: var(--dark); margin-bottom: 1rem; line-height: 1.2; }
    .cta-sub   { font-size: 0.93rem; color: var(--brown); font-weight: 300; line-height: 1.85; margin-bottom: 2.5rem; }
    .cta-btns  { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .btn-primary {
      font-family: var(--ff-disp); font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase;
      background: var(--dark); color: var(--bg);
      padding: 0.85rem 1.9rem; border: 2px solid var(--dark); border-radius: 2px;
      transition: all 0.25s; min-height: 44px; display: inline-flex; align-items: center; cursor: pointer;
    }
    .btn-primary:hover { background: var(--gold); border-color: var(--gold); color: var(--dark); }
    .btn-outline {
      font-family: var(--ff-disp); font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase;
      background: transparent; color: var(--dark);
      padding: 0.85rem 1.9rem; border: 2px solid var(--dark); border-radius: 2px;
      transition: all 0.25s; min-height: 44px; display: inline-flex; align-items: center; cursor: pointer;
    }
    .btn-outline:hover { background: var(--dark); color: var(--bg); }

    /* ── FOOTER ──────────────────────────────── */
    footer { background: var(--dark); color: #d4c5aa; padding: 3.5rem 2rem 2rem; }
    .footer-inner { max-width: 1200px; margin: 0 auto; }
    .footer-top {
      display: grid; grid-template-columns: 1.6fr 1fr 1fr;
      gap: 3rem; padding-bottom: 2rem;
      border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 1.5rem;
    }
    footer .logo-name { color: var(--gold); }
    footer .logo-sub  { color: #9a8870; }
    .footer-tagline   { font-size: 0.85rem; color: #7a6a50; font-weight: 300; line-height: 1.65; margin-top: 0.75rem; }
    .footer-email     { font-size: 0.8rem; color: var(--gold); margin-top: 0.5rem; }
    .footer-email a:hover { text-decoration: underline; }
    .footer-col-title { font-family: var(--ff-disp); font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; }
    .footer-links     { list-style: none; display: flex; flex-direction: column; gap: 0.65rem; }
    .footer-links a   { font-size: 0.84rem; color: #7a6a50; transition: color 0.2s; }
    .footer-links a:hover { color: var(--gold); }
    .footer-bottom { display: flex; align-items: center; justify-content: space-between; font-size: 0.74rem; color: #5a4a32; }
    .footer-badge  { display: flex; align-items: center; gap: 0.4rem; }
    .social-links  { display: flex; gap: 0.6rem; margin-top: 0.85rem; }
    .social-link   {
      display: inline-flex; align-items: center; justify-content: center;
      width: 34px; height: 34px; border: 1px solid rgba(201,168,92,0.25);
      border-radius: 3px; color: #7a6a50; transition: all 0.2s;
    }
    .social-link:hover { border-color: var(--gold); color: var(--gold); }

    /* ── RTL ─────────────────────────────────── */
    [dir="rtl"] .top-bar       { flex-direction: row-reverse; }
    [dir="rtl"] .top-bar-group { flex-direction: row-reverse; }
    [dir="rtl"] nav            { flex-direction: row-reverse; }
    [dir="rtl"] .nav-links     { flex-direction: row-reverse; }
    [dir="rtl"] .story-grid    { direction: rtl; }
    [dir="rtl"] .craft-grid    { direction: rtl; }
    [dir="rtl"] .craft-value   { flex-direction: row-reverse; text-align: right; }
    [dir="rtl"] .footer-top    { direction: rtl; }
    [dir="rtl"] .footer-bottom { flex-direction: row-reverse; }
    [dir="rtl"] .mobile-nav ul { direction: rtl; }
    [dir="rtl"] .cta-btns      { flex-direction: row-reverse; }
    [dir="rtl"] .page-hero     { direction: rtl; }

    /* ── RESPONSIVE ──────────────────────────── */
    @media (max-width: 900px) {
      .story-grid { grid-template-columns: 1fr; gap: 2.5rem; }
      .craft-grid { grid-template-columns: 1fr; gap: 2.5rem; }
      .craft-images { order: -1; }
      .gen-grid   { grid-template-columns: 1fr; gap: 1rem; }
      .footer-top { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 768px) {
      .top-bar   { padding: 0.4rem 1rem; }
      .hamburger { display: flex; }
      .nav-links { display: none; }
      nav        { padding: 0.75rem 1rem; }
      .section   { padding: 3rem 1rem; }
      .gen-band  { padding: 3rem 1rem; }
      .cta-band  { padding: 3rem 1rem; }
      .page-hero { padding: 3.5rem 1rem 3rem; }
      .footer-top    { grid-template-columns: 1fr; gap: 2rem; }
      .footer-bottom { flex-direction: column; gap: 0.5rem; text-align: center; }
    }
    @media (max-width: 480px) {
      .cta-btns { flex-direction: column; align-items: center; }
      .story-images { grid-template-columns: 1fr; }
      .story-img-sm:last-child { display: none; }
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════════
     THREE GENERATIONS
══════════════════════════════════════════════ -->
<div class="gen-band">
  <div class="gen-inner">
    <div class="gen-header">
      <div class="ornament" aria-hidden="true">✦ ✦ ✦</div>
      <div class="gen-tag"   data-t="gen_tag"></div>
      <h2  class="gen-title" data-t="gen_title"></h2>
    </div>
    <div class="gen-grid">
      <div class="gen-card">
        <div class="gen-num">I</div>
        <div class="gen-label" data-t="gen1_label"></div>
        <div class="gen-name"  data-t="gen1_name"></div>
        <p   class="gen-body"  data-t="gen1_body"></p>
      </div>
      <div class="gen-card">

  let currentLang = 'en';

  function setLang(l) {
    currentLang = l;
    const dict = T[l];
    const html = document.documentElement;

    document.querySelectorAll('[data-t]').forEach(el => {
      const val = dict[el.dataset.t];
      if (val === undefined) return;
      // Allow HTML in story_body and craft_body
      if (el.dataset.t === 'story_body' || el.dataset.t === 'craft_body') {
        el.innerHTML = val;
      } else {
        el.textContent = val;
      }
    });

    html.lang = l;
    html.dir  = l === 'he' ? 'rtl' : 'ltr';
    document.getElementById('btnEN').classList.toggle('active', l === 'en');
    document.getElementById('btnHE').classList.toggle('active', l === 'he');
  }

  function toggleNav() {
    const burger = document.getElementById('hamburger');
    const nav    = document.getElementById('mobileNav');
    const open   = burger.classList.toggle('open');
    nav.classList.toggle('open', open);
    burger.setAttribute('aria-expanded', open);
    nav.setAttribute('aria-hidden', !open);
  }
  function closeMobileNav() {
    const burger = document.getElementById('hamburger');
    const nav    = document.getElementById('mobileNav');
    burger.classList.remove('open');
    nav.classList.remove('open');
    burger.setAttribute('aria-expanded', 'false');
    nav.setAttribute('aria-hidden', 'true');
  }

  document.addEventListener('DOMContentLoaded', () => setLang('en'));
</script>
