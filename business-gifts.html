  <style>
    :root { --bg:#faf7f2; --dark:#202020; --gold:#d4b572; --brown:#6a5530; --border:#ede5d8; --ff-body:'Inter',Arial,sans-serif; --ff-disp:'Fraunces','Cinzel',serif; --ff-ital:'Cormorant Garamond',serif; --fs-xs:0.75rem; --fs-sm:0.875rem; --fs-base:1rem; --fs-lg:1.125rem; --fs-xl:1.5rem; --fs-2xl:2.25rem; --fs-3xl:3rem; --ff-body-he:'Heebo','Arial Hebrew',sans-serif; --ff-disp-he:'Frank Ruhl Libre','David',serif; --footer-text:#a89678; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--ff-body); background: var(--bg); color: var(--dark); line-height: 1.6; }
    img  { max-width: 100%; display: block; }
    a    { color: inherit; text-decoration: none; }
    button { cursor: pointer; font-family: inherit; border: none; background: none; }

    .top-bar { background: var(--dark); color: #d4c5aa; font-size: 0.75rem; letter-spacing: 0.04em; padding: 0.45rem 2rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
    .top-bar-group { display: flex; align-items: center; gap: 0.5rem; }
    .top-divider   { color: rgba(201,168,92,0.35); }
    .toggle-btn { background: none; border: 1px solid rgba(201,168,92,0.3); color: #d4c5aa; padding: 0.2rem 0.65rem; border-radius: 2px; font-size: 0.72rem; font-family: var(--ff-body); letter-spacing: 0.04em; transition: all 0.2s; }
    .toggle-btn.active { background: var(--gold); color: var(--dark); border-color: var(--gold); font-weight: 500; }
    .toggle-btn:hover:not(.active){ border-color: var(--gold); color: var(--gold); }

    .nav-wrap { background: var(--bg); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    nav { max-width: 1200px; margin: 0 auto; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
    .logo { display: flex; align-items: center; gap: 0.75rem; }
    .logo-mark { height: 42px; width: auto; border-radius: 3px; display: block; flex-shrink: 0; object-fit: contain; }
    .logo-text { display: flex; flex-direction: column; line-height: 1.15; }
    .logo-name { font-family: var(--ff-disp); font-size: 0.9rem; font-weight: 600; letter-spacing: 0.08em; color: var(--dark); }
    .logo-sub  { font-family: var(--ff-ital); font-style: italic; font-size: 0.7rem; color: var(--brown); letter-spacing: 0.03em; }
    .nav-links   { display: flex; align-items: center; gap: 2rem; list-style: none; }
    .nav-links a { font-family: var(--ff-disp); font-size: 0.68rem; letter-spacing: 0.13em; text-transform: uppercase; color: var(--dark); transition: color 0.2s; }
    .nav-links a:hover       { color: var(--gold); }
    .nav-links a.nav-active  { color: var(--gold); border-bottom: 1px solid var(--gold); padding-bottom: 2px; }

    .hamburger { display: none; flex-direction: column; gap: 5px; padding: 0.4rem; }
    .hamburger span { display: block; width: 24px; height: 2px; background: var(--dark); border-radius: 2px; transition: all 0.3s; }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    .mobile-nav { display: none; background: var(--bg); border-top: 1px solid var(--border); padding: 1rem 2rem 1.5rem; }
    .mobile-nav.open { display: block; }
    .mobile-nav ul { list-style: none; display: flex; flex-direction: column; gap: 0; }
    .mobile-nav a { font-family: var(--ff-disp); font-size: 0.82rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dark); display: block; padding: 0.85rem 0; border-bottom: 1px solid var(--border); min-height: 44px; display: flex; align-items: center; }
    .mobile-nav a:hover { color: var(--gold); }

    .shipping-banner { background: var(--dark); color: var(--gold); text-align: center; padding: 0.9rem 2rem; font-family: var(--ff-disp); font-size: 0.72rem; letter-spacing: 0.22em; }

    .page-hero { background: var(--dark); padding: 5.5rem 2rem 5rem; text-align: center; }
    .page-hero-inner { max-width: 760px; margin: 0 auto; }
    .breadcrumb { font-family: var(--ff-disp); font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--footer-text); margin-bottom: 1rem; }
    .breadcrumb a { color: var(--footer-text); transition: color 0.2s; }
    .breadcrumb a:hover { color: var(--gold); }
    .breadcrumb-sep { color: rgba(201,168,92,0.4); margin: 0 0.5rem; }
    .hero-icon { margin-bottom: 1.5rem; opacity: 0.7; color: var(--gold); display: flex; justify-content: center; }
    .hero-icon svg { width: 96px; height: 96px; display: block; }
    .page-eyebrow { font-family: var(--ff-disp); font-size: 0.65rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); margin-bottom: 1.25rem; }
    .page-headline { font-family: var(--ff-disp); font-size: clamp(1.55rem, 5.5vw, 3rem); font-weight: 600; line-height: 1.1; color: #faf7f2; margin-bottom: 1.25rem; }
    .page-subtitle { font-family: var(--ff-ital); font-style: italic; font-size: clamp(1rem, 1.8vw, 1.25rem); color: var(--footer-text); margin-bottom: 1.5rem; }
    .page-body { font-size: 0.95rem; line-height: 1.85; color: var(--footer-text); font-weight: 300; max-width: 580px; margin: 0 auto 2.5rem; }

    .hero-cta-row { display: flex; justify-content: center; gap: 0.85rem; flex-wrap: wrap; }
    .btn-gold { font-family: var(--ff-disp); font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; background: var(--gold); color: var(--dark); padding: 0.85rem 1.9rem; border: 2px solid var(--gold); border-radius: 2px; transition: all 0.25s; min-height: 44px; display: inline-flex; align-items: center; gap: 0.6rem; }
    .btn-gold:hover { background: transparent; color: var(--gold); }
    .btn-wa { font-family: var(--ff-disp); font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; background: #25d366; color: #fff; padding: 0.85rem 1.9rem; border: 2px solid #25d366; border-radius: 2px; transition: all 0.25s; min-height: 44px; display: inline-flex; align-items: center; gap: 0.6rem; }
    .btn-wa:hover { background: #1da851; border-color: #1da851; }

    .about-band { max-width: 980px; margin: 0 auto; padding: 5rem 2rem; }
    .about-band-inner { text-align: center; }
    .about-tag   { font-family: var(--ff-disp); font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.75rem; }
    .about-title { font-family: var(--ff-disp); font-size: clamp(1.5rem, 2.6vw, 2.2rem); font-weight: 600; color: var(--dark); margin-bottom: 1rem; }
    .about-body  { font-size: 0.96rem; color: var(--brown); font-weight: 300; line-height: 1.85; max-width: 640px; margin: 0 auto 2.5rem; }
    .ornament    { text-align: center; color: var(--gold); letter-spacing: 0.5rem; margin-bottom: 1rem; opacity: 0.55; font-size: 0.8rem; }

    .other-cats { display: flex; justify-content: center; gap: 1.5rem; flex-wrap: wrap; }
    .other-cat-link { font-family: var(--ff-disp); font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--dark); border: 1px solid var(--border); padding: 0.7rem 1.3rem; border-radius: 2px; transition: all 0.25s; min-height: 40px; display: inline-flex; align-items: center; gap: 0.4rem; }
    .other-cat-link:hover { border-color: var(--gold); color: var(--gold); }

    footer { background: var(--dark); color: #d4c5aa; padding: 3.5rem 2rem 2rem; }
    .footer-inner { max-width: 1200px; margin: 0 auto; }
    .footer-top { display: grid; grid-template-columns: 1.6fr 1fr 1fr; gap: 3rem; padding-bottom: 2rem; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 1.5rem; }
    footer .logo-name { color: var(--gold); }
    footer .logo-sub  { color: var(--footer-text); }
    .footer-tagline   { font-size: 0.85rem; color: var(--footer-text); font-weight: 300; line-height: 1.65; margin-top: 0.75rem; }
    .footer-email     { font-size: 0.8rem; color: var(--gold); margin-top: 0.5rem; }
    .footer-email a:hover { text-decoration: underline; }
    .footer-col-title { font-family: var(--ff-disp); font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; }
    .footer-links     { list-style: none; display: flex; flex-direction: column; gap: 0.65rem; }
    .footer-links a   { font-size: 0.84rem; color: var(--footer-text); transition: color 0.2s; }
    .footer-links a:hover { color: var(--gold); }
    .footer-bottom    { display: flex; align-items: center; justify-content: space-between; font-size: 0.74rem; color: var(--footer-text); }
    .footer-badge     { display: flex; align-items: center; gap: 0.4rem; }
    .social-links     { display: flex; gap: 0.6rem; margin-top: 0.85rem; }
    .social-link      { display: inline-flex; align-items: center; justify-content: center; width: 34px; height: 34px; border: 1px solid rgba(201,168,92,0.25); border-radius: 3px; color: var(--footer-text); transition: all 0.2s; }
    .social-link:hover { border-color: var(--gold); color: var(--gold); }

    [dir="rtl"] .top-bar          { flex-direction: row-reverse; }
    [dir="rtl"] .top-bar-group    { flex-direction: row-reverse; }
    [dir="rtl"] nav               { flex-direction: row-reverse; }
    [dir="rtl"] .nav-links        { flex-direction: row-reverse; }
    [dir="rtl"] .page-hero        { direction: rtl; }
    [dir="rtl"] .about-band       { direction: rtl; }
    [dir="rtl"] .footer-top       { direction: rtl; }
    [dir="rtl"] .footer-bottom    { flex-direction: row-reverse; }
    [dir="rtl"] .mobile-nav ul    { direction: rtl; }

    @media (max-width: 768px) {
      .top-bar { padding: 0.4rem 1rem; }
      .hamburger { display: flex; }
      .nav-links { display: none; }
      nav { padding: 0.75rem 1rem; }
      .page-hero { padding: 4rem 1rem 3.5rem; }
      .about-band { padding: 3rem 1rem; }
      .footer-top { grid-template-columns: 1fr 1fr; }
      .footer-bottom { flex-direction: column; gap: 0.5rem; text-align: center; }
    }
    @media (max-width: 480px) {
      .footer-top { grid-template-columns: 1fr; gap: 2rem; }
    }
  
    /* ── FLOATING WHATSAPP BUTTON ────────────── */
    .floating-wa {
      position: fixed;
      bottom: 1.5rem; right: 1.5rem;
      width: 56px; height: 56px;
      background: #25d366; color: #fff;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      z-index: 998;
      transition: transform 0.2s, background 0.2s, box-shadow 0.2s;
    }
    .floating-wa:hover {
      background: #1da851;
      transform: scale(1.08);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }
    [dir="rtl"] .floating-wa { right: auto; left: 1.5rem; }
    @media (max-width: 600px) {
      .floating-wa { bottom: 1rem; right: 1rem; width: 52px; height: 52px; }
      [dir="rtl"] .floating-wa { right: auto; left: 1rem; }
    }
  
    /* Hebrew typography */
    [lang="he"] body { font-family: var(--ff-body-he); }
    [lang="he"] .hero-headline,
    [lang="he"] .section-title,
    [lang="he"] .story-title,
    [lang="he"] .contact-title,
    [lang="he"] .corporate-title,
    [lang="he"] .cat-card-title,
    [lang="he"] .product-name,
    [lang="he"] .logo-name,
    [lang="he"] .nav-links a,
    [lang="he"] .mobile-nav a,
    [lang="he"] .btn-primary,
    [lang="he"] .btn-outline,
    [lang="he"] .btn-gold,
    [lang="he"] .btn-wa,
    [lang="he"] .btn-cart,
    [lang="he"] .form-submit,
    [lang="he"] .cta-link,
    [lang="he"] .section-tag,
    [lang="he"] .story-tag,
    [lang="he"] .contact-tag,
    [lang="he"] .corporate-tag,
    [lang="he"] .footer-col-title,
    [lang="he"] .page-headline,
    [lang="he"] .page-eyebrow,
    [lang="he"] .about-tag,
    [lang="he"] .about-title,
    [lang="he"] h1, [lang="he"] h2, [lang="he"] h3, [lang="he"] h4 { font-family: var(--ff-disp-he); letter-spacing: 0.02em; }

  </style>
</head>
