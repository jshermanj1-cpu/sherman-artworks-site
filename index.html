<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sherman Art Works, Handmade Glass Judaica from Israel</title>
  <meta name="description" content="Sherman Art Works creates handmade blown and fused glass Judaica and decorative art from Israel, Kiddush cups, Shabbat candleholders, decorative bowls and sculptural trays. Free international shipping." />

  <!-- Open Graph -->
  <meta property="og:title" content="Sherman Art Works, Handmade Glass Judaica from Israel" />
  <meta property="og:description" content="Handmade blown and fused glass Judaica and decorative art from Israel. Kiddush cups, Shabbat candleholders, decorative bowls. Free international shipping." />
  <meta property="og:type" content="website" />
  <!-- ⚠️ Replace with real Cloudinary hero image URL before launch -->
  <meta property="og:image" content="https://res.cloudinary.com/doesupaf9/image/upload/w_1200,h_630,c_fit,q_auto,f_auto/WhatsApp_Image_2026-05-23_at_14.50.45_2_lutcx6.jpg" />

  <!-- Favicon -->
  <link rel="icon" type="image/jpeg" href="https://res.cloudinary.com/doesupaf9/image/upload/w_32,h_32,c_fit,q_auto/WhatsApp_Image_2026-05-23_at_14.51.54_xv8lbd.jpg" />

  <!-- Google Fonts: Heebo (Hebrew-compatible body), Cinzel (display), Cormorant Garamond (italic accent) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,600;1,400&family=Heebo:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* ── TOKENS ──────────────────────────────── */
    :root {
      --bg:      #faf7f2;
      --dark:    #2a1f0e;
      --gold:    #c9a85c;
      --brown:   #8a6f40;
      --border:  #ede5d8;
      --ff-body: 'Heebo', sans-serif;
      --ff-disp: 'Cinzel', serif;
      --ff-ital: 'Cormorant Garamond', serif;
    }

    /* ── RESET ───────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--ff-body); background: var(--bg); color: var(--dark); line-height: 1.6; }
    img  { max-width: 100%; display: block; }
    a    { color: inherit; text-decoration: none; }
    button { cursor: pointer; font-family: inherit; border: none; background: none; }

    /* ── TOP BAR ─────────────────────────────── */
    .top-bar {
      background: var(--dark);
      color: #d4c5aa;
      font-size: 0.75rem;
      letter-spacing: 0.04em;
      padding: 0.45rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .top-bar-group { display: flex; align-items: center; gap: 0.5rem; }
    .top-divider   { color: rgba(201,168,92,0.35); }

    .toggle-btn {
      background: none;
      border: 1px solid rgba(201,168,92,0.3);
      color: #d4c5aa;
      padding: 0.2rem 0.65rem;
      border-radius: 2px;
      font-size: 0.72rem;
      font-family: var(--ff-body);
      letter-spacing: 0.04em;
      transition: all 0.2s;
    }
    .toggle-btn.active       { background: var(--gold); color: var(--dark); border-color: var(--gold); font-weight: 500; }
    .toggle-btn:hover:not(.active) { border-color: var(--gold); color: var(--gold); }

    #rateNote {
      font-size: 0.68rem;
      color: rgba(212,197,170,0.6);
      margin-left: 0.6rem;
    }

    /* ── NAV ─────────────────────────────────── */
    .nav-wrap {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    nav {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: 0.75rem; }
    .logo-mark {
      height: 42px; width: auto;
      border-radius: 3px;
      display: block;
      flex-shrink: 0;
      object-fit: contain;
    }
    .logo-text    { display: flex; flex-direction: column; line-height: 1.15; }
    .logo-name    { font-family: var(--ff-disp); font-size: 0.9rem; font-weight: 600; letter-spacing: 0.08em; color: var(--dark); }
    .logo-sub     { font-family: var(--ff-ital); font-style: italic; font-size: 0.7rem; color: var(--brown); letter-spacing: 0.03em; }
    .nav-links    { display: flex; align-items: center; gap: 2rem; list-style: none; }
    .nav-links a  { font-family: var(--ff-disp); font-size: 0.68rem; letter-spacing: 0.13em; text-transform: uppercase; color: var(--dark); transition: color 0.2s; }
    .nav-links a:hover { color: var(--gold); }

    /* Hamburger */
    .hamburger { display: none; flex-direction: column; gap: 5px; padding: 0.4rem; }
    .hamburger span { display: block; width: 24px; height: 2px; background: var(--dark); border-radius: 2px; transition: all 0.3s; }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    .mobile-nav { display: none; background: var(--bg); border-top: 1px solid var(--border); padding: 1rem 2rem 1.5rem; }
    .mobile-nav.open { display: block; }
    .mobile-nav ul { list-style: none; display: flex; flex-direction: column; gap: 0; }
    .mobile-nav a {
      font-family: var(--ff-disp); font-size: 0.82rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--dark); display: block; padding: 0.85rem 0;
      border-bottom: 1px solid var(--border);
      min-height: 44px; display: flex; align-items: center;
    }
    .mobile-nav a:hover { color: var(--gold); }

    /* ── HERO ────────────────────────────────── */
    .hero {
      max-width: 1200px;
      margin: 0 auto;
      padding: 5rem 2rem 4.5rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3.5rem;
      align-items: center;
    }
    .hero-eyebrow {
      font-family: var(--ff-disp); font-size: 0.68rem; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--gold); margin-bottom: 1.25rem;
    }
    .hero-headline {
      font-family: var(--ff-disp);
      font-size: clamp(2rem, 4vw, 3.5rem);
      font-weight: 600; line-height: 1.1; color: var(--dark); margin-bottom: 0.75rem;
    }
    .hero-subtitle {
      font-family: var(--ff-ital); font-style: italic;
      font-size: clamp(1rem, 1.8vw, 1.3rem);
      color: var(--brown); margin-bottom: 1.5rem;
    }
    .hero-body {
      font-size: 0.95rem; line-height: 1.85; color: var(--brown);
      font-weight: 300; max-width: 480px; margin-bottom: 2.5rem;
    }
    .hero-ctas { display: flex; gap: 1rem; flex-wrap: wrap; }

    .btn-primary {
      font-family: var(--ff-disp); font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase;
      background: var(--dark); color: var(--bg);
      padding: 0.85rem 1.9rem; border: 2px solid var(--dark); border-radius: 2px;
      transition: all 0.25s; min-height: 44px; display: inline-flex; align-items: center; cursor: pointer;
    }
    .btn-primary:hover { background: var(--gold); border-color: var(--gold); color: var(--dark); }
    .btn-outline {
      font-family: var(--ff-disp); font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase;
      background: transparent; color: var(--dark);
      padding: 0.85rem 1.9rem; border: 2px solid var(--dark); border-radius: 2px;
      transition: all 0.25s; min-height: 44px; display: inline-flex; align-items: center; cursor: pointer;
    }
    .btn-outline:hover { background: var(--dark); color: var(--bg); }

    .hero-images { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .hero-img-main { grid-column: 1 / -1; border-radius: 4px; overflow: hidden; }
    .hero-img-main img { width: 100%; height: auto; display: block; }
    .hero-img-sm   { border-radius: 4px; overflow: hidden; }
    .hero-img-sm img { width: 100%; height: auto; display: block; }

    /* ── SHIPPING BANNER ─────────────────────── */
    .shipping-banner {
      background: var(--dark); color: var(--gold);
      text-align: center; padding: 0.9rem 2rem;
      font-family: var(--ff-disp); font-size: 0.72rem; letter-spacing: 0.22em;
    }

    /* ── SECTION COMMONS ─────────────────────── */
    .section { max-width: 1200px; margin: 0 auto; padding: 5rem 2rem; }
    .section-divider { border-top: 1px solid var(--border); }
    .section-header  { text-align: center; margin-bottom: 3.5rem; }
    .section-tag  { font-family: var(--ff-disp); font-size: 0.62rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.75rem; }
    .section-title { font-family: var(--ff-disp); font-size: clamp(1.6rem, 2.8vw, 2.4rem); font-weight: 600; color: var(--dark); margin-bottom: 0.75rem; }
    .section-sub  { font-family: var(--ff-ital); font-style: italic; font-size: 1.05rem; color: var(--brown); }
    .ornament     { text-align: center; color: var(--gold); letter-spacing: 0.5rem; margin-bottom: 1rem; opacity: 0.55; font-size: 0.8rem; }

    /* ── PRODUCT GRID ────────────────────────── */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2rem;
    }
    .product-card {
      background: #fff; border: 1px solid var(--border); border-radius: 4px; overflow: hidden;
      transition: box-shadow 0.25s, transform 0.25s;
      display: flex; flex-direction: column;
    }
    .product-card:hover { box-shadow: 0 8px 32px rgba(42,31,14,0.1); transform: translateY(-3px); }

    .product-img-wrap { background: #f9f7f4; }
    .product-img-wrap img { width: 100%; height: auto; display: block; transition: transform 0.3s; }
    .product-card:hover .product-img-wrap img { transform: scale(1.03); }

    .product-body { padding: 1.5rem; display: flex; flex-direction: column; flex: 1; }
    .product-cats { display: flex; gap: 0.45rem; flex-wrap: wrap; margin-bottom: 0.65rem; }
    .cat-tag {
      font-family: var(--ff-disp); font-size: 0.58rem; letter-spacing: 0.13em; text-transform: uppercase;
      color: var(--gold); border: 1px solid var(--gold); padding: 0.15rem 0.5rem; border-radius: 2px;
    }
    .cat-tag-he { font-family: var(--ff-body); font-size: 0.72rem; direction: rtl; }

    .product-name { font-family: var(--ff-disp); font-size: 1rem; font-weight: 600; color: var(--dark); margin-bottom: 0.6rem; }
    .product-desc { font-size: 0.85rem; color: var(--brown); font-weight: 300; line-height: 1.65; margin-bottom: auto; padding-bottom: 1.25rem; }
    .product-footer { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }

    .price-block { display: flex; flex-direction: column; }
    .price-main  { font-family: var(--ff-disp); font-size: 1.15rem; font-weight: 600; color: var(--dark); }
    .price-alt   { font-size: 0.75rem; color: var(--brown); }

    .btn-cart {
      font-family: var(--ff-disp); font-size: 0.63rem; letter-spacing: 0.12em; text-transform: uppercase;
      background: var(--dark); color: var(--bg); padding: 0.62rem 1.2rem;
      border: 2px solid var(--dark); border-radius: 2px;
      transition: all 0.2s; min-height: 44px; white-space: nowrap; cursor: pointer;
    }
    .btn-cart:hover { background: var(--gold); border-color: var(--gold); color: var(--dark); }

    /* Coming Soon card */
    .coming-soon-card {
      border: 2px dashed var(--border); border-radius: 4px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 3rem 2rem; min-height: 380px;
      background: rgba(255,255,255,0.45);
    }
    .coming-soon-icon  { font-size: 2rem; color: var(--gold); margin-bottom: 1.25rem; opacity: 0.5; letter-spacing: 0.4rem; }
    .coming-soon-title { font-family: var(--ff-disp); font-size: 0.9rem; letter-spacing: 0.1em; color: var(--brown); margin-bottom: 0.5rem; }
    .coming-soon-sub   { font-size: 0.82rem; color: var(--brown); opacity: 0.65; }

    /* ── STORY ───────────────────────────────── */
    .story-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center; }
    .story-images { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .story-img-main { grid-column: 1 / -1; border-radius: 4px; overflow: hidden; }
    .story-img-main img { width: 100%; height: auto; display: block; }
    .story-img-sm   { border-radius: 4px; overflow: hidden; }
    .story-img-sm img { width: 100%; height: auto; display: block; }

    .story-tag  { font-family: var(--ff-disp); font-size: 0.62rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; }
    .story-title { font-family: var(--ff-disp); font-size: clamp(1.5rem, 2.4vw, 2.2rem); font-weight: 600; color: var(--dark); margin-bottom: 1.5rem; line-height: 1.2; }
    .story-body { font-size: 0.93rem; line-height: 1.95; color: var(--brown); font-weight: 300; }
    .story-sig  { margin-top: 2rem; font-family: var(--ff-ital); font-style: italic; font-size: 1.1rem; color: var(--gold); }

    /* ── CONTACT ─────────────────────────────── */
    .contact-band { border-top: 1px solid var(--border); background: #f5f0e8; }
    .contact-inner { max-width: 1200px; margin: 0 auto; padding: 5rem 2rem; }
    .contact-grid { display: grid; grid-template-columns: 1fr 1.3fr; gap: 4.5rem; align-items: start; }

    .contact-tag   { font-family: var(--ff-disp); font-size: 0.62rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.75rem; }
    .contact-title { font-family: var(--ff-disp); font-size: clamp(1.5rem, 2.4vw, 2.2rem); font-weight: 600; color: var(--dark); margin-bottom: 1rem; line-height: 1.2; }
    .contact-sub   { font-size: 0.93rem; color: var(--brown); font-weight: 300; line-height: 1.85; margin-bottom: 2rem; }

    .contact-btns { display: flex; flex-direction: column; gap: 0.85rem; }
    .cta-link {
      display: inline-flex; align-items: center; gap: 0.75rem;
      font-family: var(--ff-disp); font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 0.78rem 1.5rem; border-radius: 2px; border: 2px solid;
      transition: all 0.2s; min-height: 44px; width: fit-content; cursor: pointer;
    }
    .cta-link.wa    { background: #25d366; border-color: #25d366; color: #fff; }
    .cta-link.wa:hover { background: #1da851; border-color: #1da851; }
    .cta-link.mail  { background: transparent; border-color: var(--dark); color: var(--dark); }
    .cta-link.mail:hover { background: var(--dark); color: var(--bg); }

    /* Form */
    .contact-form { background: #fff; border: 1px solid var(--border); border-radius: 4px; padding: 2.25rem; }
    .form-field   { margin-bottom: 1.25rem; }
    .form-field label {
      display: block; font-family: var(--ff-disp); font-size: 0.62rem;
      letter-spacing: 0.15em; text-transform: uppercase; color: var(--dark); margin-bottom: 0.4rem;
    }
    .form-field input,
    .form-field textarea {
      width: 100%; padding: 0.7rem 0.9rem;
      border: 1px solid var(--border); border-radius: 2px;
      font-family: var(--ff-body); font-size: 0.9rem; color: var(--dark);
      background: var(--bg); outline: none; transition: border-color 0.2s;
    }
    .form-field input:focus,
    .form-field textarea:focus { border-color: var(--gold); }
    .form-field textarea { resize: vertical; min-height: 120px; }
    .form-submit {
      font-family: var(--ff-disp); font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase;
      background: #25d366; color: #fff; padding: 0.85rem 2rem;
      border: 2px solid #25d366; border-radius: 2px;
      width: 100%; transition: all 0.25s; min-height: 44px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 0.6rem;
    }
    .form-submit:hover { background: #1da851; border-color: #1da851; }
    .form-email-alt {
      font-family: var(--ff-disp); font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase;
      background: transparent; color: var(--brown); padding: 0.75rem 2rem;
      border: 2px solid var(--border); border-radius: 2px;
      width: 100%; transition: all 0.25s; min-height: 44px; cursor: pointer;
      margin-top: 0.6rem; display: flex; align-items: center; justify-content: center; gap: 0.6rem;
    }
    .form-email-alt:hover { border-color: var(--dark); color: var(--dark); }
    .form-note { font-size: 0.74rem; color: var(--brown); text-align: center; margin-top: 0.75rem; }

    /* ── BESTSELLER BADGE ────────────────────── */
    .product-card { position: relative; }
    .bestseller-badge {
      position: absolute; top: 0.75rem; left: 0.75rem; z-index: 1;
      background: var(--gold); color: var(--dark);
      font-family: var(--ff-disp); font-size: 0.55rem; letter-spacing: 0.15em; text-transform: uppercase;
      padding: 0.22rem 0.6rem; border-radius: 2px; pointer-events: none;
    }
    [dir="rtl"] .bestseller-badge { left: auto; right: 0.75rem; }

    /* ── CORPORATE BAND ──────────────────────── */
    .corporate-band  { background: var(--dark); padding: 4.5rem 2rem; text-align: center; }
    .corporate-inner { max-width: 640px; margin: 0 auto; }
    .corporate-tag   { font-family: var(--ff-disp); font-size: 0.62rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; }
    .corporate-title { font-family: var(--ff-disp); font-size: clamp(1.4rem, 2.4vw, 2rem); font-weight: 600; color: #faf7f2; margin-bottom: 1rem; line-height: 1.2; }
    .corporate-sub   { font-size: 0.93rem; color: #9a8870; font-weight: 300; line-height: 1.85; margin-bottom: 2.5rem; }
    [dir="rtl"] .corporate-band { direction: rtl; }

    /* ── SOCIAL LINKS ────────────────────────── */
    .social-links { display: flex; gap: 0.6rem; margin-top: 0.85rem; }
    .social-link  {
      display: inline-flex; align-items: center; justify-content: center;
      width: 34px; height: 34px; border: 1px solid rgba(201,168,92,0.25);
      border-radius: 3px; color: #7a6a50; transition: all 0.2s;
    }
    .social-link:hover { border-color: var(--gold); color: var(--gold); }

    /* ── FOOTER ──────────────────────────────── */
    footer { background: var(--dark); color: #d4c5aa; padding: 3.5rem 2rem 2rem; }
    .footer-inner { max-width: 1200px; margin: 0 auto; }
    .footer-top {
      display: grid; grid-template-columns: 1.6fr 1fr 1fr;
      gap: 3rem; padding-bottom: 2rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 1.5rem;
    }
    footer .logo-name { color: var(--gold); }
    footer .logo-sub  { color: #9a8870; }
    .footer-tagline   { font-size: 0.85rem; color: #7a6a50; font-weight: 300; line-height: 1.65; margin-top: 0.75rem; }
    .footer-email     { font-size: 0.8rem; color: var(--gold); margin-top: 0.5rem; }
    .footer-email a:hover { text-decoration: underline; }

    .footer-col-title { font-family: var(--ff-disp); font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; }
    .footer-links     { list-style: none; display: flex; flex-direction: column; gap: 0.65rem; }
    .footer-links a   { font-size: 0.84rem; color: #7a6a50; transition: color 0.2s; }
    .footer-links a:hover { color: var(--gold); }

    .footer-bottom {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 0.74rem; color: #5a4a32;
    }
    .footer-badge { display: flex; align-items: center; gap: 0.4rem; }

    /* ── RTL OVERRIDES ───────────────────────── */
    [dir="rtl"] .top-bar          { flex-direction: row-reverse; }
    [dir="rtl"] .top-bar-group    { flex-direction: row-reverse; }
    [dir="rtl"] #rateNote         { margin-left: 0; margin-right: 0.6rem; }
    [dir="rtl"] nav               { flex-direction: row-reverse; }
    [dir="rtl"] .nav-links        { flex-direction: row-reverse; }
    [dir="rtl"] .hero             { direction: rtl; }
    [dir="rtl"] .hero-ctas        { flex-direction: row-reverse; }
    [dir="rtl"] .hero-body        { margin-right: 0; }
    [dir="rtl"] .product-footer   { flex-direction: row-reverse; }
    [dir="rtl"] .product-cats     { flex-direction: row-reverse; }
    [dir="rtl"] .story-grid       { direction: rtl; }
    [dir="rtl"] .contact-grid     { direction: rtl; }
    [dir="rtl"] .contact-btns     { align-items: flex-end; }
    [dir="rtl"] .footer-top       { direction: rtl; }
    [dir="rtl"] .footer-bottom    { flex-direction: row-reverse; }
    [dir="rtl"] .mobile-nav ul    { direction: rtl; }

    /* ── RESPONSIVE ──────────────────────────── */
    @media (max-width: 900px) {
      .story-grid   { grid-template-columns: 1fr; gap: 2.5rem; }
      .contact-grid { grid-template-columns: 1fr; gap: 2.5rem; }
      .footer-top   { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 768px) {
      .top-bar  { padding: 0.4rem 1rem; }
      #rateNote { display: none; }
      .hamburger  { display: flex; }
      .nav-links  { display: none; }
      nav { padding: 0.75rem 1rem; }

      .hero {
        grid-template-columns: 1fr;
        padding: 2.5rem 1rem 2rem;
        gap: 2rem;
      }
      .hero-images { order: -1; }
      /* hero image heights are auto, no override needed */

      .section { padding: 3rem 1rem; }
      .contact-inner { padding: 3rem 1rem; }

      /* story image heights are auto, no override needed */

      .footer-top { grid-template-columns: 1fr; gap: 2rem; }
      .footer-bottom { flex-direction: column; gap: 0.5rem; text-align: center; }
    }

    @media (max-width: 480px) {

  // ── STATE ──────────────────────────────────────
  let currentLang     = 'en';
  let currentCurrency = 'USD';
  let usdRate         = null;
  let fallbackActive  = false;

  const FALLBACK_RATE_ILS_PER_USD = 3.75;
  const MARKUP_DIVISOR            = 0.98; // divide raw rate by 0.98 → +~2% effective markup

  // ── CURRENCY ───────────────────────────────────
  async function fetchRate() {
    try {
      const controller = new AbortController();
      const tid = setTimeout(() => controller.abort(), 6000);
      const res = await fetch('https://open.er-api.com/v6/latest/USD', { signal: controller.signal });
      clearTimeout(tid);
      if (!res.ok) throw new Error('API error');
      const data = await res.json();
      const raw  = data.rates && data.rates.ILS;
      if (!raw) throw new Error('No ILS rate in response');
      usdRate = raw / MARKUP_DIVISOR;
      fallbackActive = false;
      document.getElementById('rateNote').textContent = 'Rate live · +2% margin';
    } catch {
      usdRate = FALLBACK_RATE_ILS_PER_USD / MARKUP_DIVISOR;
      fallbackActive = true;
      showFallbackDisclaimer();
    }
    updatePrices();
  }

  function showFallbackDisclaimer() {
    document.getElementById('rateNote').textContent = 'Estimated rate · may not be exact';
  }

  function ilsToUsd(ils) {
    return usdRate ? ils / usdRate : null;
  }

  function fmtPrice(ils) {
    if (currentCurrency === 'ILS') {
      return '₪ ' + ils.toLocaleString('en-IL');
    }
    const usd = ilsToUsd(ils);
    return usd !== null ? '$ ' + usd.toFixed(2) : '…';
  }

  function fmtAlt(ils) {
    if (currentCurrency === 'ILS') {
      const usd = ilsToUsd(ils);
      return usd !== null ? '≈ $' + usd.toFixed(2) : '';
    }
    return '₪ ' + ils.toLocaleString('en-IL');
  }

  function updatePrices() {
    document.getElementById('b-price').textContent = fmtPrice(PRODUCTS.bowl.ils);
    document.getElementById('b-usd').textContent   = fmtAlt(PRODUCTS.bowl.ils);
    document.getElementById('c-price').textContent = fmtPrice(PRODUCTS.candles.ils);
    document.getElementById('c-usd').textContent   = fmtAlt(PRODUCTS.candles.ils);
  }

  function setCurrency(cur) {
    currentCurrency = cur;
    document.getElementById('btnILS').classList.toggle('active', cur === 'ILS');
    document.getElementById('btnUSD').classList.toggle('active', cur === 'USD');
    updatePrices();
  }

  // ── LANGUAGE ───────────────────────────────────
  function setLang(l) {
    currentLang = l;
    const dict  = T[l];
    const html  = document.documentElement;

    document.querySelectorAll('[data-t]').forEach(el => {
      const val = dict[el.dataset.t];
      if (val !== undefined) el.textContent = val;
    });

    html.lang = l;
    html.dir  = l === 'he' ? 'rtl' : 'ltr';
    document.getElementById('btnEN').classList.toggle('active', l === 'en');
    document.getElementById('btnHE').classList.toggle('active', l === 'he');
  }

  // ── CART (stub, checkout to be wired to Stripe in M11) ──
  function addToCart(item) {
    const names  = { bowl: 'Glass Decorative Bowl', candles: 'Murano Glass Candlesticks' };
    const price  = fmtPrice(PRODUCTS[item].ils);
    const waLink = `https://wa.me/${WA_NUMBER}?text=` + encodeURIComponent(`Hi, I'd like to order the ${names[item]}`);
    const msg = currentLang === 'he'
      ? `"${names[item]}", ${price}\n\nהזמנה מקוונת בקרוב. ליצירת קשר מיידית לחצו אישור.`
      : `"${names[item]}", ${price}\n\nOnline checkout coming soon. Click OK to contact us via WhatsApp.`;
    if (confirm(msg)) window.open(waLink, '_blank');
  }

  // ── CONTACT FORM ───────────────────────────────
  function getFormData() {
    return {
      name:    document.getElementById('cf-name').value.trim(),
      email:   document.getElementById('cf-email').value.trim(),
      message: document.getElementById('cf-msg').value.trim(),
    };
  }

  function submitViaWhatsApp(e) {
    e.preventDefault();
    const { name, email, message } = getFormData();
    const text = currentLang === 'he'
      ? `שלום, שמי ${name} (${email}).\n\n${message}`
      : `Hi, my name is ${name} (${email}).\n\n${message}`;
    window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(text)}`, '_blank');
  }

  function submitViaEmail() {
    const form = document.getElementById('contactForm');
    if (!form.checkValidity()) { form.reportValidity(); return; }
    const { name, email, message } = getFormData();
    const subject = encodeURIComponent('Enquiry from Sherman Art Works website');
    const body    = encodeURIComponent(`Name: ${name}\nEmail: ${email}\n\nMessage:\n${message}`);
    window.location.href = `mailto:shermanartwork@gmail.com?subject=${subject}&body=${body}`;
  }

  // ── MOBILE NAV ─────────────────────────────────
  function toggleNav() {
    const burger = document.getElementById('hamburger');
    const nav    = document.getElementById('mobileNav');
    const open   = burger.classList.toggle('open');
    nav.classList.toggle('open', open);
    burger.setAttribute('aria-expanded', open);
    nav.setAttribute('aria-hidden', !open);
  }

  function closeMobileNav() {
    const burger = document.getElementById('hamburger');
    const nav    = document.getElementById('mobileNav');
    burger.classList.remove('open');
    nav.classList.remove('open');
    burger.setAttribute('aria-expanded', 'false');
    nav.setAttribute('aria-hidden', 'true');
  }

  // ── INIT ───────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    // Sync all WhatsApp links to the WA_NUMBER constant
    const waLink = document.getElementById('waDirectLink');
    if (waLink) waLink.href = `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent("Hi, I'm interested in your handmade glass art")}`;

    const waCorp = document.getElementById('waCorporateLink');
    if (waCorp) waCorp.href = `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent("Hi, I'm interested in a corporate or bulk order.")}`;

    setLang('en');
    setCurrency('USD');
    fetchRate();
  });
</script>
