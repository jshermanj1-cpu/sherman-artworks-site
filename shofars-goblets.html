<html lang="en" dir="ltr">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shofars &amp; Goblets, Sherman Art Works</title>
  <meta name="description" content="Silver-plated shofars and ornate kiddush goblets, handcrafted in Israel. Choose your design — Jerusalem, Grapes, Crown, Lion, Menorah — and customise with a name or dedication. Free worldwide shipping." />

  <!-- Open Graph -->
  <meta property="og:title" content="Shofars &amp; Goblets, Sherman Art Works" />
  <meta property="og:description" content="Choose your shofar or goblet design. Every piece is handcrafted and customisable with a name or dedication." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://res.cloudinary.com/doesupaf9/image/upload/w_1200,h_630,c_fit,q_auto,f_auto/goblets-jerusalem-menorah_xms7et.jpg" />

  <!-- Favicon -->
  <link rel="icon" type="image/jpeg" href="https://res.cloudinary.com/doesupaf9/image/upload/w_32,h_32,c_fit,q_auto/WhatsApp_Image_2026-05-23_at_14.51.54_xv8lbd.jpg" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,600;1,400&display=swap" rel="stylesheet" />

  <style>
    :root { --bg:#faf7f2; --dark:#202020; --gold:#c9a85c; --brown:#8a6f40; --border:#ede5d8; --ff-body:Arial,sans-serif; --ff-disp:'Cinzel',serif; --ff-ital:'Cormorant Garamond',serif; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--ff-body); background: var(--bg); color: var(--dark); line-height: 1.6; }
    img  { max-width: 100%; display: block; }
    a    { color: inherit; text-decoration: none; }
    button { cursor: pointer; font-family: inherit; border: none; background: none; }

    .top-bar { background: var(--dark); color: #d4c5aa; font-size: 0.75rem; letter-spacing: 0.04em; padding: 0.45rem 2rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
    .top-bar-group { display: flex; align-items: center; gap: 0.5rem; }
    .top-divider   { color: rgba(201,168,92,0.35); }
    .toggle-btn { background: none; border: 1px solid rgba(201,168,92,0.3); color: #d4c5aa; padding: 0.2rem 0.65rem; border-radius: 2px; font-size: 0.72rem; font-family: var(--ff-body); letter-spacing: 0.04em; transition: all 0.2s; }
    .toggle-btn.active            { background: var(--gold); color: var(--dark); border-color: var(--gold); font-weight: 500; }
    .toggle-btn:hover:not(.active){ border-color: var(--gold); color: var(--gold); }

    .nav-wrap { background: var(--bg); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    nav { max-width: 1200px; margin: 0 auto; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
    .logo { display: flex; align-items: center; gap: 0.75rem; }
    .logo-mark { height: 42px; width: auto; border-radius: 3px; display: block; flex-shrink: 0; object-fit: contain; }
    .logo-text { display: flex; flex-direction: column; line-height: 1.15; }
    .logo-name { font-family: var(--ff-disp); font-size: 0.9rem; font-weight: 600; letter-spacing: 0.08em; color: var(--dark); }
    .logo-sub  { font-family: var(--ff-ital); font-style: italic; font-size: 0.7rem; color: var(--brown); letter-spacing: 0.03em; }
    .nav-links   { display: flex; align-items: center; gap: 2rem; list-style: none; }
    .nav-links a { font-family: var(--ff-disp); font-size: 0.68rem; letter-spacing: 0.13em; text-transform: uppercase; color: var(--dark); transition: color 0.2s; }
    .nav-links a:hover       { color: var(--gold); }
    .nav-links a.nav-active  { color: var(--gold); border-bottom: 1px solid var(--gold); padding-bottom: 2px; }

    .hamburger { display: none; flex-direction: column; gap: 5px; padding: 0.4rem; }
    .hamburger span { display: block; width: 24px; height: 2px; background: var(--dark); border-radius: 2px; transition: all 0.3s; }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    .mobile-nav { display: none; background: var(--bg); border-top: 1px solid var(--border); padding: 1rem 2rem 1.5rem; }
    .mobile-nav.open { display: block; }
    .mobile-nav ul { list-style: none; display: flex; flex-direction: column; gap: 0; }
    .mobile-nav a { font-family: var(--ff-disp); font-size: 0.82rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dark); display: block; padding: 0.85rem 0; border-bottom: 1px solid var(--border); min-height: 44px; display: flex; align-items: center; }
    .mobile-nav a:hover { color: var(--gold); }

    .shipping-banner { background: var(--dark); color: var(--gold); text-align: center; padding: 0.9rem 2rem; font-family: var(--ff-disp); font-size: 0.72rem; letter-spacing: 0.22em; }

    /* ── PAGE HERO ───────────────────────────── */
    .page-hero { background: var(--dark); padding: 4.5rem 2rem 4rem; text-align: center; }
    .page-hero-inner { max-width: 760px; margin: 0 auto; }
    .breadcrumb { font-family: var(--ff-disp); font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase; color: #7a6a50; margin-bottom: 1rem; }
    .breadcrumb a { color: #9a8870; transition: color 0.2s; }
    .breadcrumb a:hover { color: var(--gold); }
    .breadcrumb-sep { color: rgba(201,168,92,0.4); margin: 0 0.5rem; }
    .page-headline { font-family: var(--ff-disp); font-size: clamp(2rem, 4vw, 3rem); font-weight: 600; line-height: 1.1; color: #faf7f2; margin-bottom: 1.25rem; }
    .page-subtitle { font-family: var(--ff-ital); font-style: italic; font-size: clamp(1rem, 1.8vw, 1.2rem); color: #9a8870; margin-bottom: 0.5rem; }
    .page-body { font-size: 0.95rem; line-height: 1.85; color: #7a6a50; font-weight: 300; max-width: 560px; margin: 0 auto; }

    /* ── PRODUCT SECTION (shofars / goblets) ── */
    .product-section { max-width: 1200px; margin: 0 auto; padding: 5rem 2rem 4rem; }
    .product-section + .product-section { padding-top: 1rem; }
    .product-section-header { text-align: center; margin-bottom: 3rem; }
    .product-tag    { font-family: var(--ff-disp); font-size: 0.62rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.75rem; }
    .product-title  { font-family: var(--ff-disp); font-size: clamp(1.5rem, 2.6vw, 2.2rem); font-weight: 600; color: var(--dark); margin-bottom: 0.75rem; }
    .product-sub    { font-family: var(--ff-ital); font-style: italic; font-size: 1.05rem; color: var(--brown); max-width: 580px; margin: 0 auto; line-height: 1.55; }
    .ornament       { text-align: center; color: var(--gold); letter-spacing: 0.5rem; margin-bottom: 1rem; opacity: 0.55; font-size: 0.8rem; }

    /* ── DESIGN GRID ─────────────────────────── */
    .design-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.5rem;
    }
    .design-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      transition: all 0.3s;
      display: flex; flex-direction: column;
    }
    .design-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 28px rgba(32,32,32,0.08);
      border-color: var(--gold);
    }
    .design-card-img-wrap {
      width: 100%;
      aspect-ratio: 4 / 5;
      overflow: hidden;
      background: #f5f0e8;
      display: flex; align-items: center; justify-content: center;
      cursor: zoom-in;
    }
    .design-card-img {
      width: 100%; height: 100%;
      object-fit: contain;
      padding: 0.5rem;
      transition: transform 0.4s;
    }
    .design-card:hover .design-card-img { transform: scale(1.03); }
    .design-card-body {
      padding: 1.25rem 1.25rem 1.5rem;
      text-align: center;
      display: flex; flex-direction: column; flex: 1;
    }
    .design-card-name {
      font-family: var(--ff-disp);
      font-size: 1rem;
      letter-spacing: 0.08em;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 0.4rem;
    }
    .design-card-desc {
      font-family: var(--ff-ital);
      font-style: italic;
      font-size: 0.88rem;
      color: var(--brown);
      margin-bottom: 1.25rem;
      flex: 1;
    }
    .design-card-cta {
      font-family: var(--ff-disp); font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase;
      background: #25d366; color: #fff;
      padding: 0.7rem 1rem; border: 2px solid #25d366; border-radius: 2px;
      transition: all 0.25s; min-height: 40px;
      display: inline-flex; align-items: center; justify-content: center; gap: 0.4rem;
    }
    .design-card-cta:hover { background: #1da851; border-color: #1da851; }
    .design-card-cta svg { flex-shrink: 0; }

    /* ── CUSTOM EXAMPLE CALLOUT ──────────────── */
    .custom-example {
      max-width: 980px;
      margin: 3.5rem auto 0;
      background: #f5f0e8;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2rem;
      display: grid;
      grid-template-columns: 1fr 1.4fr;
      gap: 2rem;
      align-items: center;
    }
    .custom-example-img-wrap {
      width: 100%;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      border-radius: 3px;
      background: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: zoom-in;
    }
    .custom-example-img { width: 100%; height: 100%; object-fit: contain; padding: 0.5rem; }
    .custom-example-body { padding: 0.5rem 0; }
    .custom-example-tag    { font-family: var(--ff-disp); font-size: 0.6rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.75rem; }
    .custom-example-title  { font-family: var(--ff-disp); font-size: 1.3rem; font-weight: 600; color: var(--dark); margin-bottom: 0.75rem; line-height: 1.25; }
    .custom-example-body p { font-size: 0.92rem; color: var(--brown); font-weight: 300; line-height: 1.75; margin-bottom: 1rem; }
    .custom-example-cta {
      font-family: var(--ff-disp); font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--dark); border: 1px solid var(--dark);
      padding: 0.6rem 1.25rem; border-radius: 2px;
      transition: all 0.25s; min-height: 38px;
      display: inline-flex; align-items: center; gap: 0.4rem;
    }
    .custom-example-cta:hover { background: var(--dark); color: var(--bg); }

    /* ── BOTTOM CUSTOM BAND ──────────────────── */
    .custom-band { background: var(--dark); padding: 4rem 2rem; text-align: center; color: #d4c5aa; }
    .custom-band-inner { max-width: 720px; margin: 0 auto; }
    .custom-band-eyebrow { font-family: var(--ff-disp); font-size: 0.62rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; }
    .custom-band-title { font-family: var(--ff-disp); font-size: clamp(1.4rem, 2.6vw, 2rem); font-weight: 600; color: var(--bg); margin-bottom: 1rem; }
    .custom-band-body { font-size: 0.95rem; color: #9a8870; font-weight: 300; line-height: 1.85; margin-bottom: 2rem; }
    .btn-gold { font-family: var(--ff-disp); font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; background: var(--gold); color: var(--dark); padding: 0.85rem 2rem; border: 2px solid var(--gold); border-radius: 2px; transition: all 0.25s; min-height: 44px; display: inline-flex; align-items: center; gap: 0.6rem; }
    .btn-gold:hover { background: transparent; color: var(--gold); }

    /* ── LIGHTBOX ────────────────────────────── */
    .lightbox {
      position: fixed; inset: 0;
      background: rgba(20,14,5,0.92);
      display: none; align-items: center; justify-content: center;
      z-index: 1000;
      padding: 2rem;
      cursor: zoom-out;
    }
    .lightbox.open { display: flex; }
    .lightbox img {
      max-width: 100%; max-height: 100%;
      object-fit: contain;
      border-radius: 4px;
    }
    .lightbox-close {
      position: absolute;
      top: 1.2rem; right: 1.5rem;
      width: 44px; height: 44px;
      background: rgba(255,255,255,0.1);
      color: var(--gold);
      border: 1px solid rgba(201,168,92,0.4);
      border-radius: 50%;
      font-size: 1.5rem; line-height: 1;
      display: flex; align-items: center; justify-content: center;
    }
    .lightbox-close:hover { background: rgba(201,168,92,0.2); }

    /* ── FOOTER ──────────────────────────────── */
    footer { background: var(--dark); color: #d4c5aa; padding: 3.5rem 2rem 2rem; }
    .footer-inner { max-width: 1200px; margin: 0 auto; }
    .footer-top { display: grid; grid-template-columns: 1.6fr 1fr 1fr; gap: 3rem; padding-bottom: 2rem; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 1.5rem; }
    footer .logo-name { color: var(--gold); }
    footer .logo-sub  { color: #9a8870; }
    .footer-tagline   { font-size: 0.85rem; color: #7a6a50; font-weight: 300; line-height: 1.65; margin-top: 0.75rem; }
    .footer-email     { font-size: 0.8rem; color: var(--gold); margin-top: 0.5rem; }
    .footer-email a:hover { text-decoration: underline; }
    .footer-col-title { font-family: var(--ff-disp); font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; }
    .footer-links     { list-style: none; display: flex; flex-direction: column; gap: 0.65rem; }
    .footer-links a   { font-size: 0.84rem; color: #7a6a50; transition: color 0.2s; }
    .footer-links a:hover { color: var(--gold); }
    .footer-bottom    { display: flex; align-items: center; justify-content: space-between; font-size: 0.74rem; color: #5a4a32; }
    .footer-badge     { display: flex; align-items: center; gap: 0.4rem; }
    .social-links     { display: flex; gap: 0.6rem; margin-top: 0.85rem; }
    .social-link      { display: inline-flex; align-items: center; justify-content: center; width: 34px; height: 34px; border: 1px solid rgba(201,168,92,0.25); border-radius: 3px; color: #7a6a50; transition: all 0.2s; }
    .social-link:hover { border-color: var(--gold); color: var(--gold); }

    /* ── RTL OVERRIDES ───────────────────────── */
    [dir="rtl"] .top-bar          { flex-direction: row-reverse; }
    [dir="rtl"] .top-bar-group    { flex-direction: row-reverse; }
    [dir="rtl"] nav               { flex-direction: row-reverse; }
    [dir="rtl"] .nav-links        { flex-direction: row-reverse; }
    [dir="rtl"] .page-hero        { direction: rtl; }
    [dir="rtl"] .custom-band      { direction: rtl; }
    [dir="rtl"] .custom-example   { direction: rtl; }
    [dir="rtl"] .footer-top       { direction: rtl; }
    [dir="rtl"] .footer-bottom    { flex-direction: row-reverse; }
    [dir="rtl"] .mobile-nav ul    { direction: rtl; }

    /* ── RESPONSIVE ──────────────────────────── */
    @media (max-width: 768px) {
      .top-bar      { padding: 0.4rem 1rem; }
      .hamburger    { display: flex; }
      .nav-links    { display: none; }
      nav           { padding: 0.75rem 1rem; }
      .product-section { padding: 3rem 1rem; }
      .custom-band  { padding: 3rem 1rem; }
      .custom-example { grid-template-columns: 1fr; padding: 1.5rem; }
      .footer-top   { grid-template-columns: 1fr 1fr; }
      .footer-bottom { flex-direction: column; gap: 0.5rem; text-align: center; }
    }
    @media (max-width: 480px) {
      .footer-top { grid-template-columns: 1fr; gap: 2rem; }
      .page-hero { padding: 3rem 1rem 2.5rem; }
    }
  </style>
</head>

  function waLink(msg) {

      : (productType === 'shofars' ? 'shofar' : 'goblet');

  function renderDesigns() {
    document.getElementById('shofarGrid').innerHTML = DESIGNS.shofars.map(d => buildDesignCard('shofars', d)).join('');
    document.getElementById('gobletGrid').innerHTML = DESIGNS.goblets.map(d => buildDesignCard('goblets', d)).join('');

    // Update custom-inscription CTA link
    const msg = currentLang === 'he'
      ? 'שלום, אני רוצה להוסיף כיתוב אישי לאחת היצירות. אשמח לפרטים.'
      : "Hi, I'd like to add a custom inscription to one of your pieces. Can you walk me through the options?";
    document.getElementById('customExCta').href = waLink(msg);
  }

  function setLang(l) {
    currentLang = l;
    const dict = T[l];
    const html = document.documentElement;
    document.querySelectorAll('[data-t]').forEach(el => {
      const val = dict[el.dataset.t];
      if (val !== undefined) el.textContent = val;
    });
    html.lang = l;
    html.dir  = l === 'he' ? 'rtl' : 'ltr';
    document.getElementById('btnEN').classList.toggle('active', l === 'en');
    document.getElementById('btnHE').classList.toggle('active', l === 'he');
    renderDesigns(); // re-render cards in selected language
  }

  // ── LIGHTBOX ───────────────────────────────────
  function openLightbox(url) {
    document.getElementById('lightboxImg').src = url;
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeLightbox();
  });

  // ── MOBILE NAV ─────────────────────────────────
  function toggleNav() {
    const burger = document.getElementById('hamburger');
    const nav    = document.getElementById('mobileNav');
    const open   = burger.classList.toggle('open');
    nav.classList.toggle('open', open);
    burger.setAttribute('aria-expanded', open);
    nav.setAttribute('aria-hidden', !open);
  }
  function closeMobileNav() {
    const burger = document.getElementById('hamburger');
    const nav    = document.getElementById('mobileNav');
    burger.classList.remove('open');
    nav.classList.remove('open');
    burger.setAttribute('aria-expanded', 'false');
    nav.setAttribute('aria-hidden', 'true');
  }

  document.addEventListener('DOMContentLoaded', () => setLang('en'));
